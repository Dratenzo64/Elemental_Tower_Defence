<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dratenzo Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'Rajdhani', system-ui, sans-serif;
    color: #fff;
    padding: 32px 20px 60px;
    background:
      radial-gradient(circle at 20% 10%, #8e24aa 0%, transparent 60%),
      radial-gradient(circle at 80% 90%, #6a1b9a 0%, transparent 60%),
      linear-gradient(135deg, #2d0a4a 0%, #4a148c 40%, #6a1b9a 100%);
    background-attachment: fixed;
  }
  h1, h2, h3, .heading, .game-title, .game-genre, .play-button, .tab, .coming-soon, .game-icon {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  h1 {
    font-size: clamp(34px, 6vw, 54px);
    letter-spacing: 2px;
    text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 40px rgba(186, 104, 255, 0.4);
    margin-bottom: 6px;
  }
  .subtitle {
    color: rgba(255, 255, 255, 0.7);
    font-size: 15px;
    letter-spacing: 0.5px;
  }
  .tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 36px;
    flex-wrap: wrap;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }
  .tab {
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(255, 255, 255, 0.15);
    color: white;
    padding: 10px 22px;
    border-radius: 24px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.18s;
    font-family: inherit;
  }
  .tab:hover {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255, 255, 255, 0.3);
  }
  .tab.active {
    background: #fff;
    color: #6a1b9a;
    border-color: #fff;
    box-shadow: 0 6px 20px rgba(255, 255, 255, 0.25);
  }
  .games-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 22px;
  }
  .game-card {
    background: linear-gradient(160deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 22px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, transparent 0%, rgba(255, 255, 255, 0.06) 100%);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .game-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    border-color: rgba(255, 255, 255, 0.32);
  }
  .game-card:hover::before { opacity: 1; }
  .game-icon {
    font-size: 42px;
    letter-spacing: 6px;
    text-align: center;
    line-height: 1;
    margin: 12px 0 8px;
    padding: 18px 4px;
    border-radius: 10px;
    border: 1.5px solid rgba(255, 255, 255, 0.18);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  /* Element Tower Defense — each letter IS an element */
  .icon-etd span {
    display: inline-block;
    position: relative;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
  }
  /* E — on FIRE (orange-yellow gradient + flickering flame shadow) */
  .icon-etd .l1 {
    background: linear-gradient(180deg, #fff096 0%, #ff9a3d 35%, #ff4a1e 70%, #b81f0a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: etd-fire-flicker 0.9s infinite alternate;
  }
  .icon-etd .l1::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -10px;
    width: 28px;
    height: 14px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at bottom, rgba(255, 220, 100, 0.85) 0%, rgba(255, 140, 0, 0.55) 30%, rgba(255, 70, 0, 0) 70%);
    filter: blur(2px);
    animation: etd-fire-dance 0.6s infinite alternate;
    pointer-events: none;
  }
  @keyframes etd-fire-flicker {
    0%   { filter: drop-shadow(0 -4px 6px #ff8a3d) drop-shadow(0 0 10px #ff4a1e); }
    50%  { filter: drop-shadow(0 -7px 12px #ffb060) drop-shadow(0 0 14px #ff6b35); }
    100% { filter: drop-shadow(0 -5px 8px #ff5018) drop-shadow(0 0 8px #ff4a1e); }
  }
  @keyframes etd-fire-dance {
    0%   { transform: translateX(-50%) scaleY(1)   scaleX(1);    opacity: 0.85; }
    50%  { transform: translateX(-55%) scaleY(1.3) scaleX(0.85); opacity: 1; }
    100% { transform: translateX(-45%) scaleY(0.9) scaleX(1.1);  opacity: 0.7; }
  }
  /* T — WET (blue gradient + glossy highlight + falling water drop) */
  .icon-etd .l2 {
    background: linear-gradient(180deg, #d6ecff 0%, #5ab8ff 35%, #1976d2 80%, #0d47a1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: etd-water-shimmer 2.2s infinite alternate;
  }
  .icon-etd .l2::before {
    content: "";
    position: absolute;
    top: 3px;
    left: 22%;
    width: 6px;
    height: 14px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0));
    border-radius: 50%;
    transform: rotate(-15deg);
    pointer-events: none;
  }
  .icon-etd .l2::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -14px;
    width: 7px;
    height: 9px;
    background: radial-gradient(circle at 50% 30%, #b3dcff 0%, #3aa3ff 50%, #1565c0 100%);
    border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
    transform: translateX(-50%);
    box-shadow: 0 0 6px rgba(58, 163, 255, 0.7);
    animation: etd-water-drip 2.4s infinite;
    pointer-events: none;
  }
  @keyframes etd-water-shimmer {
    0%   { filter: drop-shadow(0 3px 6px #3aa3ff) drop-shadow(0 0 10px #5fb3ff); }
    100% { filter: drop-shadow(0 5px 10px #1976d2) drop-shadow(0 0 14px #3aa3ff); }
  }
  @keyframes etd-water-drip {
    0%, 40%   { opacity: 0; transform: translate(-50%, -18px) scale(0.6); }
    50%       { opacity: 1; transform: translate(-50%, -14px) scale(0.9); }
    80%       { opacity: 1; transform: translate(-50%, 6px)  scale(1); }
    100%      { opacity: 0; transform: translate(-50%, 16px) scale(1.1); }
  }
  /* D — LIGHTNING (yellow gradient + sudden zaps + electric bolt arc) */
  .icon-etd .l3 {
    background: linear-gradient(180deg, #ffffe0 0%, #ffe23a 40%, #ffb800 80%, #d68900 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: etd-lightning-zap 1.6s infinite;
  }
  .icon-etd .l3::before {
    /* tiny bolt scribble that flashes near the letter */
    content: "⚡";
    position: absolute;
    top: -14px;
    right: -8px;
    font-size: 16px;
    color: #fff8a0;
    text-shadow: 0 0 6px #ffe23a, 0 0 12px #fff;
    animation: etd-lightning-bolt 1.6s infinite;
    pointer-events: none;
  }
  @keyframes etd-lightning-zap {
    0%, 100%  { filter: drop-shadow(0 0 8px #ffe23a); }
    8%, 10%   { filter: drop-shadow(0 0 18px #ffffff) drop-shadow(0 0 28px #ffe23a); }
    55%       { filter: drop-shadow(0 0 10px #ffe23a); }
    62%, 64%  { filter: drop-shadow(0 0 16px #ffffff) drop-shadow(0 0 22px #ffe23a); }
  }
  @keyframes etd-lightning-bolt {
    0%, 100%  { opacity: 0; transform: scale(0.7) rotate(-10deg); }
    8%, 12%   { opacity: 1; transform: scale(1.2) rotate(10deg); }
    20%       { opacity: 0; }
    60%, 64%  { opacity: 1; transform: scale(1.1) rotate(-15deg); }
    72%       { opacity: 0; }
  }
  /* Mazebreaker — each letter is its own puzzle piece block */
  .icon-mbk { gap: 4px; padding: 12px 4px; }
  .icon-mbk span {
    display: inline-block;
    width: 38px;
    height: 38px;
    line-height: 38px;
    border-radius: 6px;
    color: #1a0533;
    box-shadow:
      inset 0 -3px 0 rgba(0, 0, 0, 0.18),
      inset 0 3px 0 rgba(255, 255, 255, 0.3),
      0 4px 10px rgba(0, 0, 0, 0.35);
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
    font-size: 22px;
    letter-spacing: 0;
    transform: rotate(-3deg);
    border: 1.5px solid rgba(0, 0, 0, 0.18);
  }
  .icon-mbk .p1 { background: #00bcd4; transform: rotate(-4deg); }
  .icon-mbk .p2 { background: #ff9800; transform: rotate(2deg); }
  .icon-mbk .p3 { background: #66bb6a; transform: rotate(-2deg); }
  .game-genre {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.55);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }
  .game-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }
  .game-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: rgba(186, 104, 255, 0.25);
    border: 1px solid rgba(186, 104, 255, 0.4);
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .game-description {
    flex: 1;
    font-size: 14px;
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.85);
  }
  .play-button {
    background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    display: inline-block;
    box-shadow: 0 6px 16px rgba(76, 175, 80, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    letter-spacing: 0.5px;
    margin-top: 4px;
    font-family: inherit;
  }
  .play-button:hover {
    transform: translateY(-2px);
    filter: brightness(1.08);
    box-shadow: 0 10px 22px rgba(76, 175, 80, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
  .play-button:active { transform: translateY(0); }
  .coming-soon {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.55);
    padding: 14px 28px;
    border-radius: 14px;
    font-size: 14px;
    text-align: center;
    font-style: italic;
    font-weight: 600;
    margin-top: 4px;
    border: 1px dashed rgba(255, 255, 255, 0.2);
  }
  .no-games {
    text-align: center;
    color: rgba(255, 255, 255, 0.6);
    font-size: 16px;
    padding: 60px 20px;
    grid-column: 1 / -1;
    font-style: italic;
  }
  footer {
    text-align: center;
    color: rgba(255, 255, 255, 0.4);
    font-size: 12px;
    margin-top: 50px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <h1>DRATENZO GAMES</h1>
  <p class="subtitle">// FREE INDIE WEB GAMES · NO INSTALLS, JUST PLAY //</p>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-category="all">All Games</button>
  <button class="tab" data-category="tower-defense">Tower Defense</button>
  <button class="tab" data-category="puzzle">Puzzle</button>
  <button class="tab" data-category="action">Action</button>
</div>

<div class="games-grid" id="games-grid"></div>

<footer>© <span id="year"></span> Dratenzo Games · Built with love</footer>

<script>
// ============================================================
// GAME LIBRARY — add new entries here as you build more games.
// Set `available: false` to show "Coming Soon" instead of a play button.
// ============================================================
const games = [
  {
    title: "Element Tower Defense",
    icon: "ETD",
    iconHtml: '<div class="game-icon icon-etd"><span class="l1">E</span><span class="l2">T</span><span class="l3">D</span></div>',
    genre: "Tower Defense",
    category: "tower-defense",
    description: "Defend against waves of enemies by placing element towers and merging them into stronger combinations. Discover 33 unique elements across 5 tiers — from basic Fire and Water all the way to apex tier-5 ultimates like Singularity, Apocalypse, and Eternity. Survive 10 scripted waves, then face endless mode where voids crack open across the field.",
    tags: ["33 Elements", "5 Tiers", "Endless Mode", "Drag to Merge"],
    url: "element-tower-defense.html",
    available: true,
  },
  {
    title: "Mazebreaker",
    icon: "MBK",
    iconHtml: '<div class="game-icon icon-mbk"><span class="p1">M</span><span class="p2">B</span><span class="p3">K</span></div>',
    genre: "Puzzle",
    category: "puzzle",
    description: "Navigate 24 hand-crafted maze levels with arrow keys or WASD. Dodge deadly spikes and find the glowing exit. Levels 11-20 are pitch-dark fog mazes that reveal as you walk near them. Levels 21-24 add bounce pads — step on a yellow pad and your next move launches you 3 cells in that direction, flying safely over walls and spikes. Progress saves automatically.",
    tags: ["24 Levels", "Fog of War", "Bounce Pads", "Spikes"],
    url: "mazebreaker.html",
    available: true,
  },
];

// ============================================================
// RENDERING — no changes needed below.
// ============================================================
const tabs = document.getElementById("tabs");
const grid = document.getElementById("games-grid");
let currentCategory = "all";

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

function render() {
  grid.innerHTML = "";
  const filtered = currentCategory === "all"
    ? games
    : games.filter(g => g.category === currentCategory);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-games">No games in this category yet. Check back soon!</div>';
    return;
  }

  for (const g of filtered) {
    const card = document.createElement("div");
    card.className = "game-card";
    const tagsHtml = (g.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");
    const action = g.available
      ? `<a href="${escapeHtml(g.url)}" class="play-button">PLAY ›</a>`
      : `<div class="coming-soon">Coming Soon</div>`;
    const iconBlock = g.iconHtml || `<div class="game-icon">${escapeHtml(g.icon)}</div>`;
    card.innerHTML = `
      ${iconBlock}
      <div class="game-genre">${escapeHtml(g.genre)}</div>
      <div class="game-title">${escapeHtml(g.title)}</div>
      <div class="game-tags">${tagsHtml}</div>
      <div class="game-description">${escapeHtml(g.description)}</div>
      ${action}
    `;
    grid.appendChild(card);
  }
}

tabs.addEventListener("click", (e) => {
  const btn = e.target.closest(".tab");
  if (!btn) return;
  for (const t of tabs.children) t.classList.remove("active");
  btn.classList.add("active");
  currentCategory = btn.dataset.category;
  render();
});

document.getElementById("year").textContent = new Date().getFullYear();
render();
</script>
</body>
</html>
