    chain: "Chains to nearby enemies",
    chainaoe: "Chains AND splashes",
    pierce: "Projectile pierces enemies",
  };
  document.getElementById("info-content").innerHTML = `
    <strong>${def.name}</strong> — Tier ${def.tier}<br>
    Damage: ${def.dmg} · Range: ${def.range} · Cooldown: ${def.cd}t<br>
    Special: ${attackDesc[def.attack] || def.attack}
    <div class="hint">Click an empty area on the map to place.</div>
  `;
}

function renderInfo() {
  const div = document.getElementById("info-content");
  const t = game.selectedTower;
  if (t) {
    const def = ELEMENTS[t.elem];
    const sellPrice = Math.floor(def.cost * 0.6);
    div.innerHTML = `
      <strong>${def.name} Tower</strong> — Tier ${def.tier}<br>
      DMG ${def.dmg} · Range ${def.range} · CD ${def.cd}t · ${def.attack}
      <div class="actions">
        <button class="sell-btn" id="btn-sell">SELL (+${sellPrice}c)</button>
        <button id="btn-deselect" style="background:#30363d;">✕ Deselect</button>
      </div>
      <div class="hint"><strong>DRAG</strong> this tower onto another tower to merge. Compatible pairs unlock new elements.</div>
    `;
    document.getElementById("btn-sell").onclick = () => {
      game.coins += sellPrice;
      game.towers = game.towers.filter(x => x !== t);
      game.selectedTower = null;
      updateHud();
      refreshShop();
      renderInfo();
      saveGame();
    };
    document.getElementById("btn-deselect").onclick = () => {
      game.selectedTower = null;
      renderInfo();
    };
  } else if (game.selectedElem) {
    showStatsHint(game.selectedElem);
  } else {
    const startName = ELEMENTS[game.startElement].name;
    const starterText = game.freeStarterAvailable
      ? `STARTER UNIT: <strong>${startName}</strong> — place one for FREE.`
      : `Earn coins by clearing waves. Buy more elements and merge them to discover new towers.`;
    const discoveredCount = game.discovered.size;
    const totalCount = Object.keys(ELEMENTS).length;
    div.innerHTML = `
      ${starterText}<br>
      <span class="hint">Discovered: ${discoveredCount}/${totalCount} elements · Click a shop element then click the map to place. Drag towers onto each other to merge!</span>
    `;
  }
}

function showMessage(title, sub) {
  const m = document.getElementById("message");
  m.innerHTML = `${title}<div class="sub">${sub || ""}</div>`;
  m.classList.add("show");
}
function hideMessage() {
  document.getElementById("message").classList.remove("show");
}

let toastTimer = null;
function showToast(text) {
  const t = document.getElementById("toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// ============================================================
// INPUT
// ============================================================
let mousePos = null;

function getMouseFromEvent(ev) {
  const rect = canvas.getBoundingClientRect();
  return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
}

function findTowerAt(x, y) {
  // foot circle takes priority (matches placement collision)
  for (const t of game.towers) {
    if (distXY(x, y, t.x, t.y) <= TOWER_RADIUS + 4) return t;
  }
  // body rectangle (the elevated castle body) — clicking on the visible tower selects it
  for (const t of game.towers) {
    if (Math.abs(x - t.x) <= TOWER_RADIUS && y >= t.y - TOWER_HEIGHT - 4 && y <= t.y + 6) return t;
  }
  return null;
}

function attemptMerge(a, b) {
  const ka = a.elem, kb = b.elem;
  const result = getMergeResult(ka, kb);
  if (result) {
    const nx = (a.x + b.x) / 2;
    const ny = (a.y + b.y) / 2;
    game.towers = game.towers.filter(t => t !== a && t !== b);
    game.towers.push({
      id: game.nextTowerId++,
      elem: result,
      x: nx, y: ny,
      cd: 0,
    });
    const wasNew = !game.discovered.has(result);
    game.discovered.add(result);
    game.selectedTower = null;
    showToast(wasNew
      ? `DISCOVERED: ${ELEMENTS[result].name}`
      : `Merged into ${ELEMENTS[result].name}`);
    for (let i = 0; i < 12; i++) {
      game.effects.push({type:"hit", x:nx + (Math.random()-0.5)*30, y:ny + (Math.random()-0.5)*30, life:20+i, max:30});
    }
  } else {
    showToast(`${ELEMENTS[ka].name} + ${ELEMENTS[kb].name} = no recipe yet`);
  }
  refreshShop();
  renderInfo();
  saveGame();
}

function handleCanvasClick(x, y) {
  // clicked an existing tower → select it
  const t = findTowerAt(x, y);
  if (t) {
    game.selectedTower = t;
    game.selectedElem = null;
    refreshShop();
    renderInfo();
    return;
  }
  // place tower
  if (game.selectedElem) {
    const def = ELEMENTS[game.selectedElem];
    const isStarter = game.selectedElem === game.startElement && game.freeStarterAvailable;
    const cost = isStarter ? 0 : def.cost;
    if (game.coins < cost) { showToast("Not enough coins"); return; }
    if (!canPlaceAt(x, y)) { showToast("Can't place here"); return; }
    game.coins -= cost;
    if (isStarter) game.freeStarterAvailable = false;
    game.towers.push({
      id: game.nextTowerId++,
      elem: game.selectedElem,
      x, y,
      cd: 0,
    });
    if (isStarter || game.coins < def.cost) game.selectedElem = null;
    updateHud();
    refreshShop();
    renderInfo();
    saveGame();
    return;
  }
  // empty click → deselect
  if (game.selectedTower) {
    game.selectedTower = null;
    renderInfo();
  }
}

canvas.addEventListener("pointerdown", (ev) => {
  if (game.state === "victory" || game.state === "defeat") return;
  const { x, y } = getMouseFromEvent(ev);
  mousePos = { x, y };
  const t = findTowerAt(x, y);
  if (t) {
    game.drag = { origin: t, mouseX: x, mouseY: y, startX: x, startY: y, didDrag: false };
    try { canvas.setPointerCapture(ev.pointerId); } catch (e) {}
  }
});

canvas.addEventListener("pointermove", (ev) => {
  const { x, y } = getMouseFromEvent(ev);
  mousePos = { x, y };
  if (game.drag) {
    game.drag.mouseX = x;
    game.drag.mouseY = y;
    if (Math.hypot(x - game.drag.startX, y - game.drag.startY) > 6) {
      game.drag.didDrag = true;
    }
  }
});

canvas.addEventListener("pointerup", (ev) => {
  if (game.state === "victory" || game.state === "defeat") { game.drag = null; return; }
  const { x, y } = getMouseFromEvent(ev);
  if (game.drag && game.drag.didDrag) {
    const target = findTowerAt(x, y);
    if (target && target !== game.drag.origin) {
      attemptMerge(game.drag.origin, target);
    } else {
      showToast("Drop on another tower to merge");
    }
    game.drag = null;
    return;
  }
  game.drag = null;
  handleCanvasClick(x, y);
});

canvas.addEventListener("pointercancel", () => { game.drag = null; });
canvas.addEventListener("pointerleave", () => { mousePos = null; });

// blur buttons after any click so Space/Enter don't re-trigger them
document.querySelectorAll("button").forEach(btn => {
  btn.addEventListener("click", () => btn.blur());
});

document.getElementById("start-wave").addEventListener("click", () => { startWave(); saveGame(); });

document.getElementById("speed-btn").addEventListener("click", () => {
  game.speed = game.speed === 1 ? 2 : 1;
  document.getElementById("speed-btn").textContent = game.speed === 1 ? "SPEED 1×" : "SPEED 2×";
});

// Restart uses native confirm() so it can never fire accidentally
const restartBtn = document.getElementById("restart-btn");
restartBtn.addEventListener("click", () => {
  if (!confirm("Start a new game? Your current progress will be lost.")) return;
  localStorage.removeItem(SAVE_KEY);
  newGame();
  hideMessage();
  refreshShop();
  renderInfo();
  updateHud();
  saveGame();
  showToast(`New game · You start with ${ELEMENTS[game.startElement].icon} ${ELEMENTS[game.startElement].name}`);
});

// keyboard
document.addEventListener("keydown", (ev) => {
  // if a button is focused, let it handle its own keys (we'll never re-trigger it via space)
  const ae = document.activeElement;
  const buttonFocused = ae && ae.tagName === "BUTTON";
  if (ev.key === "Escape") {
    if (buttonFocused) ae.blur();
    game.selectedElem = null;
    game.selectedTower = null;
    game.drag = null;
    refreshShop();
    renderInfo();
  } else if (ev.key === " ") {
    ev.preventDefault();
    if (buttonFocused) { ae.blur(); return; }
    if (game.state === "idle") startWave();
  }
});

// ============================================================
// INIT
// ============================================================
const restored = loadGame();
refreshShop();
renderInfo();
updateHud();
if (restored) {
  showToast(`Saved game restored — Wave ${game.waveNum} · ${game.towers.length} towers`);
} else {
  showToast(`Your starting element: ${ELEMENTS[game.startElement].icon} ${ELEMENTS[game.startElement].name}`);
}
loop();
</script>
