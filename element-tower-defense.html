// ============================================================
// MERGE RECIPES (order doesn't matter)
// ============================================================
const MERGE_RECIPES = [
  // Tier 1 + Tier 1 -> Tier 2
  ["fire","water","steam"],
  ["fire","earth","lava"],
  ["fire","air","lightning"],
  ["water","earth","mud"],
  ["water","air","ice"],
  ["earth","air","sand"],
  // Tier 2 + Tier 1/2 -> Tier 3
  ["fire","lightning","plasma"],
  ["lava","water","stone"],
  ["sand","fire","glass"],
  ["lightning","ice","storm"],
  // Surprise Tier 3 merges
  ["mud","air","fog"],
  ["lava","ice","obsidian"],
  ["ice","sand","crystal"],
  // Tier 4 — ultimate merges
  ["stone","glass","diamond"],
  ["plasma","storm","galaxy"],
  // Even more surprise merges
  ["lava","mud","tar"],
  ["steam","lightning","cloud"],
  ["air","plasma","aurora"],
  ["stone","storm","meteor"],
  // Newest additions
  ["earth","steam","geyser"],
  ["air","steam","hurricane"],
  ["water","sand","quicksand"],
  ["lava","lightning","magma"],
  ["mud","ice","permafrost"],

  ["water","storm","tsunami"],

  ["aurora","tsunami","eternity"],

function getMergeResult(a, b) {
  for (const [x, y, r] of MERGE_RECIPES) {
    if ((a===x && b===y) || (a===y && b===x)) return r;
  }
  return null;
}

// ============================================================
// PATH (waypoints)
// ============================================================
const PATH = [
  {x:-30,  y:90},
  {x:200,  y:90},
  {x:200,  y:230},
  {x:480,  y:230},
  {x:480,  y:370},
  {x:760,  y:370},
  {x:760,  y:140},
  {x:930,  y:140},
];

// ============================================================
// ENEMIES
// ============================================================
const ENEMY_TYPES = {
  weak:   { hp:28,   speed:1.05, reward:8,   color:"#7c9b5e", size:11, name:"Sprite"  },
  normal: { hp:60,   speed:1.25, reward:12,  color:"#5e7d9c", size:13, name:"Trooper" },
  fast:   { hp:42,   speed:2.20, reward:17,  color:"#9c5e7d", size:10, name:"Runner"  },
  tank:   { hp:220,  speed:0.65, reward:42,  color:"#a08c4f", size:18, name:"Tank"    },

  boss:   { hp:1400, speed:0.50, reward:300, color:"#c0392b", size:26, name:"Boss"    },
};

// ============================================================
// WAVES — each spawn entry: [type, count, intervalTicks, startDelay]
// ============================================================
const WAVES = [
  { spawns:[["weak", 12, 45, 0]],                                                  reward:45,  hpMul:1.0  },
  { spawns:[["weak", 8, 35, 0], ["normal", 6, 50, 200]],                           reward:55,  hpMul:1.18 },
  { spawns:[["normal", 12, 40, 0], ["fast", 8, 60, 250]],                          reward:70,  hpMul:1.36 },
  { spawns:[["fast", 14, 28, 0], ["normal", 10, 45, 300]],                         reward:85,  hpMul:1.55 },
  { spawns:[["swarm", 28, 16, 0], ["tank", 4, 180, 300]],                          reward:100, hpMul:1.78 },
  { spawns:[["normal", 14, 32, 0], ["fast", 12, 28, 200], ["tank", 5, 160, 500]],  reward:115, hpMul:2.05 },
  { spawns:[["fast", 22, 22, 0], ["tank", 7, 120, 300]],                           reward:130, hpMul:2.35 },
  { spawns:[["swarm", 38, 13, 0], ["tank", 9, 100, 300]],                          reward:150, hpMul:2.65 },
  { spawns:[["normal", 20, 28, 0], ["fast", 16, 22, 200], ["tank", 9, 90, 400]],   reward:180, hpMul:3.00 },
  { spawns:[["fast", 18, 20, 0], ["tank", 7, 100, 300], ["boss", 2, 240, 600]],    reward:300, hpMul:3.40 },
];

// ============================================================
// GAME STATE
// ============================================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

// ============================================================
// SAVE / LOAD — saves to BOTH localStorage AND URL hash so the
// game survives browser refreshes / Live Server auto-reloads
// even when localStorage isn't persisted (e.g. file:// origins).
// ============================================================
const SAVE_KEY = "etd-save-v1";
const HASH_PREFIX = "#s=";

function encodeSaveData() {
  const data = {
    l: game.lives,
    c: game.coins,
    w: game.waveNum,
    s: game.startElement,
    f: game.freeStarterAvailable ? 1 : 0,
    d: Array.from(game.discovered),
    t: game.towers.map(t => [t.elem, Math.round(t.x), Math.round(t.y)]),
    ds: (game.deadSpots || []).map(d => [Math.round(d.x), Math.round(d.y), Math.round(d.r)]),
  };
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function decodeSaveData(str) {
  try {
    return JSON.parse(decodeURIComponent(escape(atob(str))));
  } catch (e) {
    try { return JSON.parse(atob(str)); } catch (e2) { return null; }
  }
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  try { history.replaceState(null, "", location.pathname + location.search); } catch (e) {}
}

function saveGame() {
  if (!game) return;
  if (game.state === "victory" || game.state === "defeat") { clearSave(); return; }
  try {
    const enc = encodeSaveData();
    try { localStorage.setItem(SAVE_KEY, enc); } catch (e) {}
    try { history.replaceState(null, "", HASH_PREFIX + enc); } catch (e) {}
  } catch (e) {}
}

function loadGame() {
  // URL hash takes priority — it survives even when localStorage is wiped.
  let raw = null;
  if (location.hash && location.hash.startsWith(HASH_PREFIX)) {
    raw = location.hash.slice(HASH_PREFIX.length);
  }
  if (!raw) {
    try { raw = localStorage.getItem(SAVE_KEY); } catch (e) {}
  }
  if (!raw) return false;
  const data = decodeSaveData(raw);
  if (!data || typeof data.l !== "number") return false;
  try {
    game.lives = data.l;
    game.coins = data.c;
    game.waveNum = data.w;
    game.startElement = data.s;
    game.freeStarterAvailable = !!data.f;
    game.discovered = new Set(data.d);
    game.towers = (data.t || []).map(([elem, x, y]) => ({
      id: game.nextTowerId++,
      elem, x, y, cd: 0,
    }));
    game.deadSpots = (data.ds || []).map(([x, y, r]) => ({ x, y, r }));
    game.state = "idle";
    return true;
  } catch (e) {
    return false;
  }
}

// also save right before the page is unloaded (e.g. Live Server reload)
window.addEventListener("beforeunload", () => { try { saveGame(); } catch (e) {} });
window.addEventListener("pagehide", () => { try { saveGame(); } catch (e) {} });

let game;
function newGame() {
  const baseElements = ["fire","water","earth","air"];
  const startElem = baseElements[Math.floor(Math.random()*baseElements.length)];
  game = {
    lives: 3,
    coins: 500,
    waveNum: 0,
    state: "idle", // idle | spawning | running | victory | defeat
    startElement: startElem,
    freeStarterAvailable: true,
    discovered: new Set(["fire","water","earth","air"]), // visible in shop
    selectedElem: null,         // element key from shop
    selectedTower: null,        // placed tower object
    drag: null,                 // {origin, mouseX, mouseY, startX, startY, didDrag}
    deadSpots: [],              // [{x, y, r}] — appear after wave 10, block placement
    towers: [],
    enemies: [],
    projectiles: [],
    effects: [],
    spawnQueue: [],             // items: {type, time}
    spawnTimer: 0,
    speed: 1,                   // 1 or 2
    tick: 0,
    nextTowerId: 1,
    pendingNotifs: [],
  };
}
newGame();

// ============================================================
// UTILS
// ============================================================
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function distXY(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

// distance from point to nearest point on a path segment
function distToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx*dx + dy*dy;
  let t = lenSq === 0 ? 0 : ((px - ax)*dx + (py - ay)*dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const cx = ax + t*dx, cy = ay + t*dy;
  return Math.hypot(px - cx, py - cy);
}
function distToPath(px, py) {
  let m = Infinity;
  for (let i = 0; i < PATH.length - 1; i++) {
    const d = distToSegment(px, py, PATH[i].x, PATH[i].y, PATH[i+1].x, PATH[i+1].y);
    if (d < m) m = d;
  }
  return m;
}

const PATH_RADIUS = 28;       // can't place towers within this of path
const TOWER_MIN_DIST = 38;    // can't place towers this close to other towers
const TOWER_RADIUS = 18;
const TOWER_HEIGHT = 28;      // visual height of castle tower (drawn upward)

function canPlaceAt(x, y) {
  if (x < 20 || x > W - 20 || y < 20 || y > H - 20) return false;
  if (distToPath(x, y) < PATH_RADIUS) return false;
  for (const t of game.towers) if (distXY(x, y, t.x, t.y) < TOWER_MIN_DIST) return false;
  // dead spots block placement entirely
  if (game.deadSpots) {
    for (const d of game.deadSpots) {
      if (distXY(x, y, d.x, d.y) < d.r + TOWER_RADIUS - 4) return false;
    }
  }
  return true;
}

// ============================================================
// DRAWING
// ============================================================
function drawBackground() {
  // sky-to-ground gradient suggests a tilted view
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#0f1828");
  grad.addColorStop(0.4, "#1a2332");
  grad.addColorStop(1, "#243250");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // ground-plane perspective tiles (lines getting tighter toward "horizon")
  ctx.strokeStyle = "rgba(255,255,255,0.035)";
  ctx.lineWidth = 1;
  // converging lines toward a vanishing point near top-center
  const vpX = W / 2, vpY = -120;
  for (let i = -8; i <= 8; i++) {
    const baseX = W / 2 + i * (W / 14);
    ctx.beginPath();
    ctx.moveTo(baseX, H);
    ctx.lineTo(vpX + (baseX - vpX) * 0.25, 0);
    ctx.stroke();
  }
  // horizontal "rows" - smaller spacing toward top
  for (let i = 1; i <= 14; i++) {
    const t = i / 14;
    const y = H - Math.pow(t, 1.6) * H;
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function drawPath() {
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  // soft drop shadow (offset for the angled feel)
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = 48;
  ctx.beginPath();
  ctx.moveTo(PATH[0].x + 2, PATH[0].y + 5);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x + 2, PATH[i].y + 5);
  ctx.stroke();
  // outer dark stones
  ctx.strokeStyle = "#2c3a4f";
  ctx.lineWidth = 44;
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x, PATH[i].y);
  ctx.stroke();
  // inner road
  ctx.strokeStyle = "#3a4d68";
  ctx.lineWidth = 36;
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x, PATH[i].y);
  ctx.stroke();
  // inner highlight (top edge - looks lit)
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 30;
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y - 3);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x, PATH[i].y - 3);
  ctx.stroke();
  // dashed centerline
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 10]);
  ctx.beginPath();
  ctx.moveTo(PATH[0].x, PATH[0].y);
  for (let i = 1; i < PATH.length; i++) ctx.lineTo(PATH[i].x, PATH[i].y);
  ctx.stroke();
  ctx.setLineDash([]);
  // start gate (green flag)
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.beginPath(); ctx.ellipse(PATH[0].x + 32, PATH[0].y + 6, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#3fb950";
  ctx.beginPath(); ctx.arc(PATH[0].x + 30, PATH[0].y, 13, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.5)";
  ctx.lineWidth = 1.5; ctx.stroke();
  // end gate (red flag)
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.beginPath(); ctx.ellipse(PATH[PATH.length - 1].x - 28, PATH[PATH.length - 1].y + 6, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#f85149";
  ctx.beginPath(); ctx.arc(PATH[PATH.length - 1].x - 30, PATH[PATH.length - 1].y, 13, 0, Math.PI * 2); ctx.fill();
  ctx.stroke();
}

// is this hex/rgb color light enough that we should use dark symbol on top?
function isLightColor(hex) {
  const c = hex.replace("#", "");
  const r = parseInt(c.substr(0, 2), 16);
  const g = parseInt(c.substr(2, 2), 16);
  const b = parseInt(c.substr(4, 2), 16);
  return (r * 0.299 + g * 0.587 + b * 0.114) > 165;
}

// draws a custom symbol for an element, centered at (0,0). caller must save/translate.
function drawElementSymbol(elem, size, color) {
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  const s = size;
  switch (elem) {
    case "fire": // upward triangle (alchemical fire)
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(-s * 0.87, s * 0.55);
      ctx.lineTo(s * 0.87, s * 0.55);
      ctx.closePath();
      ctx.stroke();
      break;
    case "water": // downward triangle
      ctx.beginPath();
      ctx.moveTo(0, s);
      ctx.lineTo(-s * 0.87, -s * 0.55);
      ctx.lineTo(s * 0.87, -s * 0.55);
      ctx.closePath();
      ctx.stroke();
      break;
    case "earth": // downward triangle with bar (alchemical earth)
      ctx.beginPath();
      ctx.moveTo(0, s);
      ctx.lineTo(-s * 0.87, -s * 0.55);
      ctx.lineTo(s * 0.87, -s * 0.55);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-s * 0.5, 0);
      ctx.lineTo(s * 0.5, 0);
      ctx.stroke();
      break;
    case "air": // upward triangle with bar (alchemical air)
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(-s * 0.87, s * 0.55);
      ctx.lineTo(s * 0.87, s * 0.55);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-s * 0.5, 0);
      ctx.lineTo(s * 0.5, 0);
      ctx.stroke();
      break;
    case "steam": // three wavy lines
      for (let i = -1; i <= 1; i++) {
        const yy = i * s * 0.45;
        ctx.beginPath();
        ctx.moveTo(-s, yy);
        ctx.bezierCurveTo(-s * 0.3, yy - s * 0.35, s * 0.3, yy + s * 0.35, s, yy);
        ctx.stroke();
      }
      break;
    case "lava": // up triangle with dots inside (molten)
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(-s * 0.87, s * 0.55);
      ctx.lineTo(s * 0.87, s * 0.55);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath(); ctx.arc(-s * 0.3, s * 0.15, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(s * 0.3, s * 0.15, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -s * 0.15, 1.5, 0, Math.PI * 2); ctx.fill();
      break;
    case "lightning": { // zigzag bolt
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(s * 0.35, -s);
      ctx.lineTo(-s * 0.35, 0);
      ctx.lineTo(s * 0.1, 0);
      ctx.lineTo(-s * 0.3, s);
      ctx.stroke();
      break;
    }
    case "mud": // square with wavy line
      ctx.strokeRect(-s * 0.75, -s * 0.75, s * 1.5, s * 1.5);
      ctx.beginPath();
      ctx.moveTo(-s * 0.55, 0);
      ctx.bezierCurveTo(-s * 0.2, -s * 0.35, s * 0.2, s * 0.35, s * 0.55, 0);
      ctx.stroke();
      break;
    case "ice": // 6-spoke snowflake
      ctx.lineWidth = 1.7;
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3;
        const ex = Math.cos(a) * s, ey = Math.sin(a) * s;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        // little tips
        const tx = Math.cos(a + Math.PI / 6) * s * 0.4;
        const ty = Math.sin(a + Math.PI / 6) * s * 0.4;
        ctx.beginPath();
        ctx.moveTo(ex * 0.7, ey * 0.7);
        ctx.lineTo(ex * 0.7 + tx * 0.5, ey * 0.7 + ty * 0.5);
        ctx.stroke();
      }
      break;
    case "sand": // 3x3 dot grid
      for (let i = -1; i <= 1; i++) {
        for (let j = -1; j <= 1; j++) {
          ctx.beginPath();
          ctx.arc(i * s * 0.5, j * s * 0.5, 1.4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      break;
    case "plasma": // starburst with core
      ctx.lineWidth = 1.7;
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * s * 0.35, Math.sin(a) * s * 0.35);
        ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s);
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      break;
    case "stone": { // hexagon with two stripes
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 - Math.PI / 2;
        const x2 = Math.cos(a) * s, y2 = Math.sin(a) * s;
        if (i === 0) ctx.moveTo(x2, y2); else ctx.lineTo(x2, y2);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-s * 0.6, -s * 0.3);
      ctx.lineTo(s * 0.6, -s * 0.3);
      ctx.moveTo(-s * 0.6, s * 0.3);
      ctx.lineTo(s * 0.6, s * 0.3);
      ctx.stroke();
      break;
    }
    case "glass": // diamond with internal cross
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.95, 0);
      ctx.lineTo(0, s);
      ctx.lineTo(-s * 0.95, 0);
      ctx.closePath();
      ctx.stroke();
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(-s * 0.4, -s * 0.4);
      ctx.lineTo(s * 0.4, s * 0.4);
      ctx.moveTo(s * 0.4, -s * 0.4);
      ctx.lineTo(-s * 0.4, s * 0.4);
      ctx.stroke();
      break;
    case "storm": { // spiral
      ctx.lineWidth = 2;
      ctx.beginPath();
      const turns = 2.2, steps = 70;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const a = t * turns * Math.PI * 2;
        const r = t * s;
        const px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      break;
    }
    case "fog": { // cloud of overlapping circles
      const positions = [
        [-s * 0.45, s * 0.05, s * 0.5],
        [s * 0.45, s * 0.1, s * 0.5],
        [0, -s * 0.35, s * 0.55],
        [-s * 0.15, s * 0.4, s * 0.4],
        [s * 0.2, s * 0.4, s * 0.4],
      ];
      for (const [cx, cy, cr] of positions) {
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.stroke();
      }
      break;
    }
    case "obsidian": { // jagged shard
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.55, -s * 0.25);
      ctx.lineTo(s * 0.25, -s * 0.05);
      ctx.lineTo(s * 0.45, s * 0.95);
      ctx.lineTo(-s * 0.3, s * 0.65);
      ctx.lineTo(-s * 0.5, -s * 0.05);
      ctx.lineTo(-s * 0.2, -s * 0.3);
      ctx.closePath();
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.25;
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    }
    case "crystal": { // hexagon gem with facets
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 - Math.PI / 2;
        const x2 = Math.cos(a) * s, y2 = Math.sin(a) * s;
        if (i === 0) ctx.moveTo(x2, y2); else ctx.lineTo(x2, y2);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(0, -s); ctx.lineTo(0, s);
      ctx.moveTo(-s * 0.87, -s * 0.5); ctx.lineTo(s * 0.87, s * 0.5);
      ctx.moveTo(-s * 0.87, s * 0.5); ctx.lineTo(s * 0.87, -s * 0.5);
      ctx.stroke();
      break;
    }
    case "diamond": { // brilliant cut diamond
      ctx.beginPath();
      ctx.moveTo(-s * 0.85, -s * 0.35);
      ctx.lineTo(s * 0.85, -s * 0.35);
      ctx.lineTo(0, s);
      ctx.closePath();
      ctx.stroke();
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(-s * 0.85, -s * 0.35); ctx.lineTo(0, -s * 0.65);
      ctx.lineTo(s * 0.85, -s * 0.35);
      ctx.moveTo(-s * 0.4, -s * 0.35); ctx.lineTo(0, s);
      ctx.moveTo(s * 0.4, -s * 0.35); ctx.lineTo(0, s);
      ctx.moveTo(0, -s * 0.65); ctx.lineTo(0, s);
      ctx.stroke();
      break;
    }
    case "tar": { // dripping blob
      ctx.beginPath();
      ctx.moveTo(-s * 0.85, -s * 0.2);
      ctx.bezierCurveTo(-s * 0.95, -s * 0.85, s * 0.95, -s * 0.85, s * 0.85, -s * 0.2);
      ctx.bezierCurveTo(s * 0.85, s * 0.2, s * 0.55, s * 0.4, s * 0.45, s * 0.35);
      ctx.bezierCurveTo(s * 0.35, s * 0.7, -s * 0.3, s * 0.75, -s * 0.4, s * 0.4);
      ctx.bezierCurveTo(-s * 0.6, s * 0.4, -s * 0.85, s * 0.2, -s * 0.85, -s * 0.2);
      ctx.closePath();
      ctx.stroke();
      // drips below
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(-s * 0.4, s * 0.45);
      ctx.lineTo(-s * 0.4, s * 0.95);
      ctx.moveTo(s * 0.45, s * 0.4);
      ctx.lineTo(s * 0.45, s * 0.85);
      ctx.stroke();
      // little teardrop tips
      ctx.beginPath();
      ctx.arc(-s * 0.4, s * 0.95, 1.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.45, s * 0.85, 1.4, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case "cloud": { // dense cloud cluster with little bolt inside
      const positions = [
        [-s * 0.5, -s * 0.05, s * 0.55],
        [s * 0.5, 0, s * 0.55],
        [0, -s * 0.55, s * 0.55],
        [-s * 0.25, s * 0.4, s * 0.45],
        [s * 0.3, s * 0.4, s * 0.45],
      ];
      for (const [px, py, pr] of positions) {
        ctx.beginPath();
        ctx.arc(px, py, pr, 0, Math.PI * 2);
        ctx.stroke();
      }
      // tiny lightning bolt at center
      ctx.lineWidth = 1.7;
      ctx.beginPath();
      ctx.moveTo(s * 0.15, -s * 0.2);
      ctx.lineTo(-s * 0.05, s * 0.05);
      ctx.lineTo(s * 0.1, s * 0.05);
      ctx.lineTo(-s * 0.1, s * 0.35);
      ctx.stroke();
      break;
    }
    case "aurora": { // wavy ribbons of light
      ctx.lineWidth = 1.7;
      for (let row = -2; row <= 2; row++) {
        const yOff = row * s * 0.32;
        ctx.beginPath();
        for (let x = -s; x <= s; x += 2) {
          const wy = yOff + Math.sin((x / s) * Math.PI * 1.6 + row * 0.7) * s * 0.12;
          if (x === -s) ctx.moveTo(x, wy);
          else ctx.lineTo(x, wy);
        }
        ctx.stroke();
      }
      break;
    }
    case "geyser": { // upward water spout with spray
      ctx.lineWidth = 2;
      // 3 vertical jets
      ctx.beginPath();
      ctx.moveTo(0, s * 0.7); ctx.lineTo(0, -s * 0.85);
      ctx.moveTo(-s * 0.4, s * 0.7); ctx.lineTo(-s * 0.4, -s * 0.45);
      ctx.moveTo(s * 0.4, s * 0.7); ctx.lineTo(s * 0.4, -s * 0.45);
      ctx.stroke();
      // ground at base
      ctx.beginPath();
      ctx.moveTo(-s, s * 0.85);
      ctx.bezierCurveTo(-s * 0.5, s * 0.6, s * 0.5, s, s, s * 0.85);
      ctx.stroke();
      // spray dots
      for (const [px, py] of [[-s*0.55, -s*0.95], [-s*0.15, -s*0.8], [s*0.15, -s*0.8], [s*0.55, -s*0.95], [0, -s]]) {
        ctx.beginPath();
        ctx.arc(px, py, 1.3, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case "hurricane": { // tight spiral with arrow tip
      ctx.lineWidth = 2;
      ctx.beginPath();
      const turns = 2.6, steps = 80;
      let endX = 0, endY = 0;
      for (let i = 0; i <= steps; i++) {
        const tt = i / steps;
        const a = tt * turns * Math.PI * 2;
        const r = tt * s;
        const px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        if (i === steps) { endX = px; endY = py; }
      }
      ctx.stroke();
      // arrow head at outer end
      const tipA = turns * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(endX, endY);
      ctx.lineTo(endX - Math.cos(tipA - 0.6) * s * 0.18, endY - Math.sin(tipA - 0.6) * s * 0.18);
      ctx.moveTo(endX, endY);
      ctx.lineTo(endX - Math.cos(tipA + 0.6) * s * 0.18, endY - Math.sin(tipA + 0.6) * s * 0.18);
      ctx.stroke();
      break;
    }
    case "quicksand": { // hourglass with sand dots
      ctx.beginPath();
      ctx.moveTo(-s * 0.75, -s);
      ctx.lineTo(s * 0.75, -s);
      ctx.lineTo(0, 0);
      ctx.lineTo(s * 0.75, s);
      ctx.lineTo(-s * 0.75, s);
      ctx.lineTo(0, 0);
      ctx.closePath();
      ctx.stroke();
      // top half sand grains
      const top = [[-s*0.3, -s*0.55], [s*0.3, -s*0.45], [0, -s*0.7], [-s*0.15, -s*0.25], [s*0.1, -s*0.3]];
      for (const [px, py] of top) {
        ctx.beginPath();
        ctx.arc(px, py, 1.1, 0, Math.PI * 2);
        ctx.fill();
      }
      // bottom mound
      const bottom = [[-s*0.45, s*0.78], [-s*0.2, s*0.62], [0, s*0.55], [s*0.2, s*0.62], [s*0.45, s*0.78]];
      for (const [px, py] of bottom) {
        ctx.beginPath();
        ctx.arc(px, py, 1.1, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case "magma": { // upward triangle with internal lightning
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(-s * 0.87, s * 0.55);
      ctx.lineTo(s * 0.87, s * 0.55);
      ctx.closePath();
      ctx.stroke();
      // lightning bolt inside
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(s * 0.25, -s * 0.55);
      ctx.lineTo(-s * 0.2, -s * 0.05);
      ctx.lineTo(s * 0.05, -s * 0.05);
      ctx.lineTo(-s * 0.2, s * 0.45);
      ctx.stroke();
      break;
    }
    case "permafrost": { // 4-spoke snowflake with hanging icicle
      ctx.lineWidth = 1.7;
      for (let i = 0; i < 4; i++) {
        const a = i * Math.PI / 2;
        const ex = Math.cos(a) * s * 0.75, ey = Math.sin(a) * s * 0.75;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        // each tip gets a small fork
        const forkA = a + Math.PI / 4;
        const fx = Math.cos(forkA) * s * 0.25, fy = Math.sin(forkA) * s * 0.25;
        ctx.beginPath();
        ctx.moveTo(ex * 0.7, ey * 0.7);
        ctx.lineTo(ex * 0.7 + fx, ey * 0.7 + fy);
        ctx.stroke();
      }
      // icicle hanging below
      ctx.beginPath();
      ctx.moveTo(-s * 0.18, s * 0.78);
      ctx.lineTo(0, s * 0.98);
      ctx.lineTo(s * 0.18, s * 0.78);
      ctx.closePath();
      ctx.stroke();
      break;
    }
    case "inferno": { // double flame, central core
      // outer flame
      ctx.beginPath();
      ctx.moveTo(0, s);
      ctx.bezierCurveTo(-s * 0.85, s * 0.3, -s * 0.7, -s * 0.5, 0, -s);
      ctx.bezierCurveTo(s * 0.7, -s * 0.5, s * 0.85, s * 0.3, 0, s);
      ctx.stroke();
      // inner flame
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.55);
      ctx.bezierCurveTo(-s * 0.42, s * 0.15, -s * 0.35, -s * 0.3, 0, -s * 0.6);
      ctx.bezierCurveTo(s * 0.35, -s * 0.3, s * 0.42, s * 0.15, 0, s * 0.55);
      ctx.stroke();
      // central glow
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.18, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case "tsunami": { // big curling wave with spray
      ctx.lineWidth = 2;
      // main curl
      ctx.beginPath();
      ctx.moveTo(-s, s * 0.4);
      ctx.bezierCurveTo(-s * 0.6, s * 0.3, -s * 0.5, -s * 0.5, 0, -s * 0.5);
      ctx.bezierCurveTo(s * 0.4, -s * 0.5, s * 0.7, 0, s * 0.5, s * 0.45);
      ctx.bezierCurveTo(s * 0.3, s * 0.65, s * 0.15, s * 0.2, s * 0.35, -s * 0.05);
      ctx.stroke();
      // base wave
      ctx.beginPath();
      ctx.moveTo(-s, s * 0.85);
      ctx.bezierCurveTo(-s * 0.3, s * 0.7, s * 0.5, s, s, s * 0.7);
      ctx.stroke();
      // spray
      for (const [px, py] of [[s*0.2, -s*0.45], [s*0.45, -s*0.25], [s*0.55, -s*0.5]]) {
        ctx.beginPath();
        ctx.arc(px, py, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case "meteor": { // comet head with motion-streak tail
      ctx.lineWidth = 1.6;
      // tail streaks (upper-left to mid)
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const off = i * s * 0.2;
        ctx.moveTo(-s + off, -s + off);
        ctx.lineTo(s * 0.25 - i * s * 0.08, s * 0.25 - i * s * 0.08);
        ctx.stroke();
      }
      // meteor head
      ctx.beginPath();
      ctx.arc(s * 0.4, s * 0.4, s * 0.45, 0, Math.PI * 2);
      ctx.stroke();
      // inner glow
      ctx.beginPath();
      ctx.arc(s * 0.4, s * 0.4, s * 0.22, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case "singularity": { // black hole — concentric rings + central swirl
      ctx.lineWidth = 1.6;
      // 3 concentric rings, getting thinner toward center
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.arc(0, 0, s * (i / 3.2), 0, Math.PI * 2);
        ctx.stroke();
      }
      // tight inner spiral
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      const spiralSteps = 50;
      for (let i = 0; i <= spiralSteps; i++) {
        const tt = i / spiralSteps;
        const a = tt * Math.PI * 4;
        const r = (1 - tt) * s * 0.55;
        const px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      // black-hole center dot
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.18, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case "apocalypse": { // explosive radial burst with central core
      ctx.lineWidth = 2;
      // 8 long rays
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * s * 0.3, Math.sin(a) * s * 0.3);
        ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s);
        ctx.stroke();
      }
      // 8 shorter rays in between
      ctx.lineWidth = 1.4;
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4 + Math.PI / 8;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * s * 0.35, Math.sin(a) * s * 0.35);
        ctx.lineTo(Math.cos(a) * s * 0.7, Math.sin(a) * s * 0.7);
        ctx.stroke();
      }
      // filled central core
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.28, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case "eternity": { // infinity / ouroboros symbol
      ctx.lineWidth = 2.2;
      // figure-8 (two ellipses joined at center)
      ctx.beginPath();
      ctx.ellipse(-s * 0.45, 0, s * 0.42, s * 0.42, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(s * 0.45, 0, s * 0.42, s * 0.42, 0, 0, Math.PI * 2);
      ctx.stroke();
      // central nexus
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.13, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case "galaxy": { // spiral with stars
      ctx.lineWidth = 1.6;
      // two-armed spiral
      for (let arm = 0; arm < 2; arm++) {
        ctx.beginPath();
        const turns = 1.6, steps = 60, offs = arm * Math.PI;
        for (let i = 0; i <= steps; i++) {
          const tt = i / steps;
          const a = tt * turns * Math.PI * 2 + offs;
          const r = tt * s;
          const px = Math.cos(a) * r, py = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
      // bright core
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.18, 0, Math.PI * 2);
      ctx.fill();
      // 4 stars sprinkled around
      const stars = [[s * 0.7, -s * 0.5], [-s * 0.6, s * 0.5], [s * 0.4, s * 0.7], [-s * 0.7, -s * 0.4]];
      for (const [sx, sy] of stars) {
        ctx.beginPath();
        ctx.arc(sx, sy, 1.3, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
  }
}

// helpers for tower art
function tracePolygon(sides, radius, rotation = 0) {
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const a = i * 2 * Math.PI / sides - Math.PI / 2 + rotation;
    const x = Math.cos(a) * radius;
    const y = Math.sin(a) * radius;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}
function traceStar(points, outerR, innerR, rotation = 0) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const a = i * Math.PI / points - Math.PI / 2 + rotation;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = Math.cos(a) * r;
    const y = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}
function shadeColor(hex, amt) {
  // amt > 0 lightens, amt < 0 darkens, range -1..1
  const c = hex.replace("#", "");
  const r = parseInt(c.substr(0, 2), 16);
  const g = parseInt(c.substr(2, 2), 16);
  const b = parseInt(c.substr(4, 2), 16);
  let nr, ng, nb;
  if (amt >= 0) {
    nr = r + (255 - r) * amt;
    ng = g + (255 - g) * amt;
    nb = b + (255 - b) * amt;
  } else {
    nr = r * (1 + amt);
    ng = g * (1 + amt);
    nb = b * (1 + amt);
  }
  return `rgb(${nr | 0},${ng | 0},${nb | 0})`;
}

function drawTowerOrbits(t, def, tier, seed, depth) {
  const cx = t.x;
  // orbit goes around the UPPER BODY of the castle (so back/front are visibly different)
  const orbitCenterY = t.y - TOWER_HEIGHT * 0.55;
  const orbitR = TOWER_RADIUS + 5;
  const vScale = 0.5;

  // depth = "back" draws orbs whose screen y is above center (going behind tower)
  // depth = "front" draws orbs whose screen y is below center (in front of tower)
  const isBack = depth === "back";
  const isFront = depth === "front";

  // sa > 0 → screen y > center → orb is in front (drawn in front pass)
  // sa < 0 → screen y < center → orb is behind (drawn in back pass)
  function include(sa) {
    if (isBack) return sa < 0;
    if (isFront) return sa >= 0;
    return true;
  }

  function orb(angle, baseColor, frontSize, backSize, useShade) {
    const sa = Math.sin(angle);
    if (!include(sa)) return;
    const ox = cx + Math.cos(angle) * orbitR;
    const oy = orbitCenterY + sa * orbitR * vScale;
    const isFrontOrb = sa >= 0;
    const sz = isFrontOrb ? frontSize : backSize;
    const fill = useShade ? shadeColor(baseColor, isFrontOrb ? 0.4 : -0.3) : baseColor;
    if (isFrontOrb) {
      ctx.shadowColor = baseColor;
      ctx.shadowBlur = 6;
    }
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(ox, oy, sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  if (tier === 1) {
    const rot = game.tick * 0.04 + seed;
    for (let i = 0; i < 4; i++) orb(rot + i * Math.PI / 2, def.color, 3, 2.1, true);
  } else if (tier === 2) {
    const rot = game.tick * 0.045 + seed;
    for (let i = 0; i < 6; i++) orb(rot + i * Math.PI / 3, def.color, 2.7, 1.9, true);
    // counter-rotating silver inner ring (also depth-filtered)
    const rot2 = -rot * 0.7;
    for (let i = 0; i < 3; i++) {
      const a = rot2 + i * Math.PI * 2 / 3;
      const sa = Math.sin(a);
      if (!include(sa)) continue;
      const innerR = orbitR - 7;
      const ox = cx + Math.cos(a) * innerR;
      const oy = orbitCenterY + sa * innerR * vScale;
      ctx.fillStyle = sa >= 0 ? "#f4f6fa" : "#9ea7b3";
      ctx.beginPath();
      ctx.arc(ox, oy, sa >= 0 ? 1.7 : 1.3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (tier === 3) {
    const rot = game.tick * 0.05 + seed;
    for (let i = 0; i < 3; i++) orb(rot + i * Math.PI * 2 / 3, "#ffd700", 3, 2.1, false);
    // pulsing gold core ABOVE the tower (always visible, drawn in front pass only)
    if (isFront) {
      const pulse = 0.5 + 0.5 * Math.sin(game.tick * 0.12 + seed);
      ctx.fillStyle = `rgba(255, 215, 0, ${0.5 + pulse * 0.4})`;
      ctx.shadowColor = "#ffd700";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(cx, t.y - TOWER_HEIGHT - 6, 3 + pulse * 1.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  } else if (tier === 4) {
    // 5 rainbow sparkles in same horizontal-ring orbit (back/front both visible)
    const rot = game.tick * 0.06 + seed;
    const baseHue = (game.tick * 2 + seed * 100) % 360;
    const orbR2 = orbitR + 2;
    for (let i = 0; i < 5; i++) {
      const a = rot + i * Math.PI * 2 / 5;
      const sa = Math.sin(a);
      if (!include(sa)) continue;
      const ox = cx + Math.cos(a) * orbR2;
      const oy = orbitCenterY + sa * orbR2 * vScale;
      const isFrontOrb = sa >= 0;
      const sparkHue = (baseHue + i * 72) % 360;
      ctx.fillStyle = `hsl(${sparkHue}, 100%, ${isFrontOrb ? 65 : 45}%)`;
      ctx.shadowColor = `hsl(${sparkHue}, 100%, 65%)`;
      ctx.shadowBlur = isFrontOrb ? 9 : 0;
      ctx.beginPath();
      ctx.arc(ox, oy, isFrontOrb ? 2.6 : 1.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  } else if (tier === 5) {
    // 7 rainbow sparkles + brighter, faster, larger orbit — true apex feel
    const rot = game.tick * 0.08 + seed;
    const baseHue = (game.tick * 4 + seed * 100) % 360;
    const orbR2 = orbitR + 4;
    for (let i = 0; i < 7; i++) {
      const a = rot + i * Math.PI * 2 / 7;
      const sa = Math.sin(a);
      if (!include(sa)) continue;
      const ox = cx + Math.cos(a) * orbR2;
      const oy = orbitCenterY + sa * orbR2 * vScale;
      const isFrontOrb = sa >= 0;
      const sparkHue = (baseHue + i * (360 / 7)) % 360;
      ctx.fillStyle = `hsl(${sparkHue}, 100%, ${isFrontOrb ? 72 : 50}%)`;
      ctx.shadowColor = `hsl(${sparkHue}, 100%, 70%)`;
      ctx.shadowBlur = isFrontOrb ? 12 : 0;
      ctx.beginPath();
      ctx.arc(ox, oy, isFrontOrb ? 3 : 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    // pulsing white core right at the orbit center (front pass only)
    if (isFront) {
      const pulse = 0.5 + 0.5 * Math.sin(game.tick * 0.2 + seed);
      ctx.fillStyle = `hsla(${baseHue}, 100%, 80%, ${0.6 + pulse * 0.4})`;
      ctx.shadowColor = `hsl(${baseHue}, 100%, 70%)`;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(cx, orbitCenterY, 4 + pulse * 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

function drawTower(t, isSelected) {
  const def = ELEMENTS[t.elem];
  const tier = def.tier;
  const seed = t.id * 1.37;
  const cx = t.x;
  const groundY = t.y + 4;             // base of the tower (sits on ground)
  const bodyTopY = t.y - TOWER_HEIGHT; // top of crenellations rim
  const r = TOWER_RADIUS;

  // === RANGE RING (ground ellipse) ===
  if (isSelected) {
    ctx.fillStyle = def.color + "1f";
    ctx.strokeStyle = def.color + "88";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx, t.y + 4, def.range, def.range * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  // === GROUND SHADOW (offset for "light from upper-left") ===
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath();
  ctx.ellipse(cx + 5, groundY + 4, r + 1, (r + 1) * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  // === GLOW AURA on ground ===
  const auraR = r + 12 + Math.sin(game.tick * 0.06 + seed) * 1.5;
  const aura = ctx.createRadialGradient(cx, t.y + 4, r * 0.3, cx, t.y + 4, auraR);
  aura.addColorStop(0, def.color + "55");
  aura.addColorStop(1, def.color + "00");
  ctx.fillStyle = aura;
  ctx.beginPath();
  ctx.ellipse(cx, t.y + 4, auraR, auraR * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();

  // === STONE FOUNDATION (wider base block) ===
  const baseR = r + 3;
  ctx.fillStyle = "#2e3340";
  ctx.fillRect(cx - baseR, t.y - 2, baseR * 2, 8);
  // base top ellipse
  ctx.fillStyle = "#4a5160";
  ctx.beginPath();
  ctx.ellipse(cx, t.y - 2, baseR, baseR * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // base bottom shadow edge
  ctx.fillStyle = "#1a1d27";
  ctx.beginPath();
  ctx.ellipse(cx, t.y + 6, baseR, baseR * 0.32, 0, 0, Math.PI, true);
  ctx.fill();

  // === ORBITING CIRCLES — back pass (orbs going BEHIND the tower) ===
  // these are drawn before the body so the body covers them
  drawTowerOrbits(t, def, tier, seed, "back");

  // === TOWER BODY (cylinder in element color) ===
  // body fill - left-to-right gradient (lit from upper-left)
  const bodyGrad = ctx.createLinearGradient(cx - r, 0, cx + r, 0);
  bodyGrad.addColorStop(0, shadeColor(def.color, 0.15));
  bodyGrad.addColorStop(0.4, shadeColor(def.color, 0.05));
  bodyGrad.addColorStop(1, shadeColor(def.color, -0.5));
  ctx.fillStyle = bodyGrad;
  ctx.fillRect(cx - r, bodyTopY, r * 2, t.y - 2 - bodyTopY);

  // brick lines (horizontal stone seams)
  ctx.strokeStyle = "rgba(0,0,0,0.28)";
  ctx.lineWidth = 1;
  const brickRows = 4;
  const brickH = (t.y - 2 - bodyTopY) / brickRows;
  for (let i = 1; i < brickRows; i++) {
    const yy = bodyTopY + brickH * i;
    ctx.beginPath();
    ctx.moveTo(cx - r + 1, yy);
    ctx.lineTo(cx + r - 1, yy);
    ctx.stroke();
  }
  // brick verticals (alternating offset, subtle)
  ctx.strokeStyle = "rgba(0,0,0,0.18)";
  for (let row = 0; row < brickRows; row++) {
    const yTop = bodyTopY + brickH * row;
    const offset = (row % 2) * (r / 2);
    for (let v = -r + offset; v < r; v += r) {
      if (v > -r && v < r) {
        ctx.beginPath();
        ctx.moveTo(cx + v, yTop);
        ctx.lineTo(cx + v, yTop + brickH);
        ctx.stroke();
      }
    }
  }

  // === TOWER TOP RIM (drawn FIRST so crenellations show on top of it) ===
  ctx.fillStyle = shadeColor(def.color, 0.3);
  ctx.beginPath();
  ctx.ellipse(cx, bodyTopY, r, r * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // inner dark hole (looking down into the tower)
  ctx.fillStyle = shadeColor(def.color, -0.65);
  ctx.beginPath();
  ctx.ellipse(cx, bodyTopY - 0.5, r - 4, (r - 4) * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();

  // === CRENELLATIONS (notches sit ON TOP of the rim) ===
  {
    const notchCount = 5;
    const notchSlot = (r * 2) / notchCount;
    const notchH = 7;
    const notchBase = bodyTopY - 1; // bottom of notches sits just above rim
    for (let i = 0; i < notchCount; i++) {
      if (i % 2 !== 0) continue; // only i=0,2,4 → 3 visible battlements
      const nx = cx - r + i * notchSlot;
      // face (lit)
      ctx.fillStyle = shadeColor(def.color, 0.2);
      ctx.fillRect(nx, notchBase - notchH, notchSlot, notchH);
      // top edge highlight (catches the light)
      ctx.fillStyle = shadeColor(def.color, 0.45);
      ctx.fillRect(nx, notchBase - notchH, notchSlot, 1.6);
      // right side shadow
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(nx + notchSlot - 1.5, notchBase - notchH, 1.5, notchH);
      // dark seam at the base where notch meets the rim
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(nx, notchBase - 1, notchSlot, 1);
    }
  }

  // === ORBITING CIRCLES — front pass (orbs in front of the tower) ===
  drawTowerOrbits(t, def, tier, seed, "front");

  // === SYMBOL PLAQUE on the body (front face) ===
  const plaqueY = t.y - TOWER_HEIGHT * 0.55;
  const plaqueR = 9;
  // shadow behind plaque
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath();
  ctx.arc(cx + 1, plaqueY + 1, plaqueR, 0, Math.PI * 2);
  ctx.fill();
  // plaque face
  ctx.fillStyle = shadeColor(def.color, -0.55);
  ctx.beginPath();
  ctx.arc(cx, plaqueY, plaqueR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = shadeColor(def.color, 0.4);
  ctx.lineWidth = 1.3;
  ctx.stroke();
  // muzzle flash right after firing
  if (t.cd && t.cd > def.cd - 4) {
    const flash = (t.cd - (def.cd - 4)) / 4;
    ctx.fillStyle = `rgba(255, 240, 180, ${flash * 0.85})`;
    ctx.beginPath();
    ctx.arc(cx, plaqueY, plaqueR + 6 * flash, 0, Math.PI * 2);
    ctx.fill();
  }
  // symbol on plaque
  const symbolColor = isLightColor(def.color) ? "#0a0e14" : "#ffffff";
  ctx.save();
  ctx.translate(cx, plaqueY);
  ctx.shadowColor = "rgba(0,0,0,0.5)";
  ctx.shadowBlur = 2;
  drawElementSymbol(t.elem, 6.5, symbolColor);
  ctx.shadowBlur = 0;
  ctx.restore();

  // === TIER FLAG (silver / gold / rainbow banner above) ===
  if (tier >= 2) {
    let bannerColor;
    if (tier === 2) bannerColor = "#dde2eb";
    else if (tier === 3) bannerColor = "#ffd700";
    else if (tier === 4) bannerColor = `hsl(${(game.tick * 2 + seed * 100) % 360}, 100%, 65%)`;
    else bannerColor = `hsl(${(game.tick * 5 + seed * 100) % 360}, 100%, 78%)`;
    // pole
    ctx.strokeStyle = "#1a1d27";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, bodyTopY - 2);
    ctx.lineTo(cx, bodyTopY - 16);
    ctx.stroke();
    // pole top knob
    ctx.fillStyle = bannerColor;
    ctx.beginPath();
    ctx.arc(cx, bodyTopY - 16, 1.7, 0, Math.PI * 2);
    ctx.fill();
    // banner triangle (waving)
    const wave = Math.sin(game.tick * 0.18 + seed) * 1.5;
    ctx.fillStyle = bannerColor;
    ctx.beginPath();
    ctx.moveTo(cx, bodyTopY - 15);
    ctx.lineTo(cx + 9, bodyTopY - 12 + wave);
    ctx.lineTo(cx, bodyTopY - 9);
    ctx.closePath();
    ctx.fill();
    // banner shadow fold
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.moveTo(cx, bodyTopY - 12);
    ctx.lineTo(cx + 5, bodyTopY - 11 + wave * 0.6);
    ctx.lineTo(cx, bodyTopY - 9);
    ctx.closePath();
    ctx.fill();
  }

  // === Tier 5 extras: pulsing rainbow halo + extra inner gold ring ===
  if (tier === 5) {
    const baseHue = (game.tick * 5 + seed * 100) % 360;
    const pulse = 0.5 + 0.5 * Math.sin(game.tick * 0.18 + seed);
    // pulsing rainbow halo just above the crenellations
    ctx.strokeStyle = `hsl(${baseHue}, 100%, 70%)`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = `hsl(${baseHue}, 100%, 70%)`;
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.ellipse(cx, bodyTopY - 6, r + 6 + pulse * 2, (r + 6 + pulse * 2) * 0.35, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // counter-rotating gold inner ring above the halo
    const rot2 = -game.tick * 0.08 + seed;
    for (let i = 0; i < 4; i++) {
      const a = rot2 + i * Math.PI / 2;
      const orbR = r - 2;
      const sx = cx + Math.cos(a) * orbR;
      const sy = (bodyTopY - 22) + Math.sin(a) * orbR * 0.3;
      ctx.fillStyle = "#fff7cc";
      ctx.shadowColor = "#ffd700";
      ctx.shadowBlur = 9;
      ctx.beginPath();
      ctx.arc(sx, sy, 2.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // === ELEMENT NAME LABEL (below tower) — auto-shrinks for long names ===
  const labelText = def.name.toUpperCase();
  const labelMaxW = TOWER_RADIUS * 2 + 10; // ~46px max — same width as a short name's label
  let labelSize = 9;
  ctx.font = `bold ${labelSize}px Orbitron, system-ui, sans-serif`;
  while (ctx.measureText(labelText).width > labelMaxW - 8 && labelSize > 6) {
    labelSize -= 0.5;
    ctx.font = `bold ${labelSize}px Orbitron, system-ui, sans-serif`;
  }
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  const labelW = ctx.measureText(labelText).width + 8;
  const labelY = t.y + 14;
  ctx.fillStyle = "rgba(0,0,0,0.8)";
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(cx - labelW / 2, labelY - 7, labelW, 13, 3);
  else ctx.rect(cx - labelW / 2, labelY - 7, labelW, 13);
  ctx.fill();
  ctx.fillStyle = def.color;
  ctx.fillText(labelText, cx, labelY);

  // === SELECTED HIGHLIGHT (blue ground ring) ===
  if (isSelected) {
    ctx.strokeStyle = "#58a6ff";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.ellipse(cx, t.y + 4, r + 5, (r + 5) * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // === DRAG ORIGIN PULSE (orange ground ring) ===
  if (game.drag && game.drag.origin === t) {
    ctx.strokeStyle = "#d29922";
    ctx.lineWidth = 3;
    const p = 4 + Math.sin(game.tick * 0.2) * 3;
    ctx.beginPath();
    ctx.ellipse(cx, t.y + 4, r + p, (r + p) * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawDragLine() {
  if (!game.drag || !game.drag.didDrag) return;
  const o = game.drag.origin;
  const mx = game.drag.mouseX, my = game.drag.mouseY;
  // dashed line from origin to mouse
  ctx.strokeStyle = "#d29922";
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(o.x, o.y);
  ctx.lineTo(mx, my);
  ctx.stroke();
  ctx.setLineDash([]);
  // hover target highlight + recipe preview
  const target = findTowerAt(mx, my);
  if (target && target !== o) {
    const result = getMergeResult(o.elem, target.elem);
    const ok = !!result;
    ctx.strokeStyle = ok ? "#3fb950" : "#f85149";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(target.x, target.y + 4, TOWER_RADIUS + 6, (TOWER_RADIUS + 6) * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
    if (ok) {
      const def = ELEMENTS[result];
      const wasNew = !game.discovered.has(result);
      const label = `= ${def.name}${wasNew ? "  NEW!" : ""}`;
      ctx.font = "bold 13px sans-serif";
      const w = ctx.measureText(label).width + 16;
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.fillRect(mx + 14, my - 28, w, 22);
      ctx.fillStyle = wasNew ? "#ffe23a" : "#3fb950";
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.fillText(label, mx + 22, my - 17);
    } else {
      ctx.font = "bold 12px sans-serif";
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      const label = "no recipe";
      const w = ctx.measureText(label).width + 16;
      ctx.fillRect(mx + 14, my - 28, w, 22);
      ctx.fillStyle = "#f85149";
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.fillText(label, mx + 22, my - 17);
    }
  }
}

function drawEnemy(e) {
  const def = ENEMY_TYPES[e.type];
  // ground shadow (offset to the right for "light from upper-left")
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath();
  ctx.ellipse(e.x + 3, e.y + def.size * 0.8, def.size * 0.95, def.size * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // body sphere with simple shading
  const baseColor = e.frozen > 0 ? "#a6e3ff" : def.color;
  const grad = ctx.createRadialGradient(e.x - def.size * 0.35, e.y - def.size * 0.4, def.size * 0.2, e.x, e.y, def.size);
  grad.addColorStop(0, shadeColor(baseColor, 0.5));
  grad.addColorStop(1, shadeColor(baseColor, -0.25));
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(e.x, e.y, def.size, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.55)";
  ctx.lineWidth = 1.4; ctx.stroke();
  // tiny eye highlight
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.beginPath();
  ctx.arc(e.x - def.size * 0.3, e.y - def.size * 0.35, def.size * 0.18, 0, Math.PI * 2);
  ctx.fill();
  // burn fx
  if (e.burn > 0) {
    ctx.fillStyle = "rgba(255,107,53,0.65)";
    for (let i = 0; i < 3; i++) {
      const ang = Math.random() * Math.PI * 2;
      const r = def.size + Math.random() * 4;
      ctx.beginPath();
      ctx.arc(e.x + Math.cos(ang) * r, e.y + Math.sin(ang) * r - 2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // hp bar
  const w = def.size * 2.4;
  const hpRatio = e.hp / e.maxHp;
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(e.x - w / 2, e.y - def.size - 9, w, 4);
  ctx.fillStyle = hpRatio > 0.5 ? "#3fb950" : hpRatio > 0.25 ? "#d29922" : "#f85149";
  ctx.fillRect(e.x - w / 2, e.y - def.size - 9, w * hpRatio, 4);
}

function drawProjectile(p) {
  const def = ELEMENTS[p.elem];
  ctx.fillStyle = def.color;
  ctx.shadowColor = def.color;
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawEffect(fx) {
  const a = fx.life / fx.max;
  if (fx.type === "explosion") {
    const r = (1 - a) * fx.r;
    ctx.strokeStyle = `rgba(255,107,53,${a})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(fx.x, fx.y, r, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = `rgba(255,180,0,${a*0.4})`;
    ctx.beginPath(); ctx.arc(fx.x, fx.y, r, 0, Math.PI*2); ctx.fill();
  } else if (fx.type === "lightning") {
    ctx.strokeStyle = fx.color || "#ffe23a";
    ctx.lineWidth = 2 + a * 2;
    ctx.shadowColor = fx.color || "#ffe23a";
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(fx.x1, fx.y1);
    // jagged
    const steps = 4;
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const x = fx.x1 + (fx.x2 - fx.x1) * t + (Math.random() - 0.5) * 16;
      const y = fx.y1 + (fx.y2 - fx.y1) * t + (Math.random() - 0.5) * 16;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(fx.x2, fx.y2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  } else if (fx.type === "hit") {
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(fx.x, fx.y, (1-a) * 14, 0, Math.PI*2); ctx.fill();
  } else if (fx.type === "damage") {
    ctx.fillStyle = `rgba(255,80,80,${a})`;
    ctx.font = "bold 13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(fx.text, fx.x, fx.y - (1-a) * 18);
  } else if (fx.type === "freeze") {
    ctx.strokeStyle = `rgba(166,227,255,${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(fx.x, fx.y, (1-a) * 18, 0, Math.PI*2); ctx.stroke();
  }
}

function drawPlacementPreview() {
  if (!game.selectedElem) return;
  const def = ELEMENTS[game.selectedElem];
  const m = mousePos;
  if (!m) return;
  const ok = canPlaceAt(m.x, m.y);
  ctx.globalAlpha = 0.6;
  // range as ground ellipse
  ctx.fillStyle = ok ? def.color + "33" : "#f8514933";
  ctx.strokeStyle = ok ? def.color : "#f85149";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(m.x, m.y + 4, def.range, def.range * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // ghost castle silhouette at cursor
  const r = TOWER_RADIUS;
  const top = m.y - TOWER_HEIGHT;
  ctx.fillStyle = ok ? def.color + "aa" : "#f8514988";
  ctx.fillRect(m.x - r, top, r * 2, TOWER_HEIGHT);
  // crenellation hint
  for (let i = 0; i < 5; i += 2) {
    ctx.fillRect(m.x - r + i * (r * 2 / 5), top - 5, r * 2 / 5, 5);
  }
  // base ellipse
  ctx.beginPath();
  ctx.ellipse(m.x, m.y + 4, r + 2, (r + 2) * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // symbol on plaque
  ctx.save();
  ctx.translate(m.x, m.y - TOWER_HEIGHT * 0.55);
  drawElementSymbol(game.selectedElem, 7, ok ? "#ffffff" : "#f85149");
  ctx.restore();
  // label preview — auto-shrinks for long names
  const lt = def.name.toUpperCase();
  const lpMaxW = TOWER_RADIUS * 2 + 10;
  let lpSize = 9;
  ctx.font = `bold ${lpSize}px Orbitron, system-ui, sans-serif`;
  while (ctx.measureText(lt).width > lpMaxW - 8 && lpSize > 6) {
    lpSize -= 0.5;
    ctx.font = `bold ${lpSize}px Orbitron, system-ui, sans-serif`;
  }
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  const lw = ctx.measureText(lt).width + 8;
  ctx.fillRect(m.x - lw / 2, m.y + 8, lw, 13);
  ctx.fillStyle = ok ? def.color : "#f85149";
  ctx.fillText(lt, m.x, m.y + 14);
  ctx.globalAlpha = 1;
}

function drawDeadSpots() {
  if (!game.deadSpots) return;
  for (const d of game.deadSpots) {
    const pulse = 0.5 + 0.5 * Math.sin(game.tick * 0.04 + d.x * 0.01);
    // outer red glow
    const glow = ctx.createRadialGradient(d.x, d.y, d.r * 0.5, d.x, d.y, d.r * 1.4);
    glow.addColorStop(0, "rgba(248, 81, 73, 0)");
    glow.addColorStop(0.5, `rgba(248, 81, 73, ${0.18 + pulse * 0.18})`);
    glow.addColorStop(1, "rgba(248, 81, 73, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r * 1.4, 0, Math.PI * 2);
    ctx.fill();
    // dark core
    const dark = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r);
    dark.addColorStop(0, "rgba(15, 0, 5, 0.95)");
    dark.addColorStop(0.7, "rgba(15, 0, 5, 0.75)");
    dark.addColorStop(1, "rgba(15, 0, 5, 0.25)");
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
    // pulsing red border
    ctx.strokeStyle = `rgba(248, 81, 73, ${0.5 + pulse * 0.4})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.stroke();
    // jagged crack pattern radiating from center
    ctx.strokeStyle = `rgba(248, 81, 73, ${0.45 + pulse * 0.25})`;
    ctx.lineWidth = 1.3;
    const seed = d.x * 0.01 + d.y * 0.01;
    for (let i = 0; i < 7; i++) {
      const a = (i / 7) * Math.PI * 2 + seed;
      const innerR = d.r * 0.15;
      const outerR = d.r * 0.92;
      const midR = (innerR + outerR) * 0.5 + Math.sin(seed + i) * 4;
      ctx.beginPath();
      ctx.moveTo(d.x + Math.cos(a) * innerR, d.y + Math.sin(a) * innerR);
      ctx.lineTo(d.x + Math.cos(a + 0.18) * midR, d.y + Math.sin(a + 0.18) * midR);
      ctx.lineTo(d.x + Math.cos(a + 0.05) * outerR, d.y + Math.sin(a + 0.05) * outerR);
      ctx.stroke();
    }
    // warning skull in the center
    ctx.fillStyle = `rgba(248, 81, 73, ${0.75 + pulse * 0.25})`;
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("!", d.x, d.y);
  }
}

function render() {
  drawBackground();
  drawPath();
  drawDeadSpots();
  // sort objects by y so closer ones render on top of farther ones (3D-ish layering)
  const layered = [];
  for (const t of game.towers) layered.push({ kind: "tower", obj: t, y: t.y });
  for (const e of game.enemies) layered.push({ kind: "enemy", obj: e, y: e.y });
  layered.sort((a, b) => a.y - b.y);
  for (const item of layered) {
    if (item.kind === "tower") drawTower(item.obj, item.obj === game.selectedTower);
    else drawEnemy(item.obj);
  }
  for (const p of game.projectiles) drawProjectile(p);
  for (const fx of game.effects) drawEffect(fx);
  if (!game.drag) drawPlacementPreview();
  drawDragLine();
}

// ============================================================
// COMBAT
// ============================================================
function damageEnemy(e, dmg) {
  if (e.dead) return;
  e.hp -= dmg;
  if (dmg >= 1) {
    game.effects.push({type:"damage", x:e.x, y:e.y - 14, text:Math.round(dmg), life:24, max:24});
  }
  if (e.hp <= 0) {
    e.dead = true;
    game.coins += e.reward;
    game.effects.push({type:"hit", x:e.x, y:e.y, life:14, max:14});
    updateHud();
    refreshShop();
  }
}

function findTarget(t) {
  const def = ELEMENTS[t.elem];
  let best = null, bestProgress = -1;
  for (const e of game.enemies) {
    if (e.dead) continue;
    if (distXY(t.x, t.y, e.x, e.y) > def.range) continue;
    // prefer enemy furthest along path (highest pathIdx, then nearest to next waypoint)
    const progress = e.pathIdx * 10000 + (10000 - distXY(e.x, e.y, PATH[Math.min(e.pathIdx+1, PATH.length-1)].x, PATH[Math.min(e.pathIdx+1, PATH.length-1)].y));
    if (progress > bestProgress) {
      bestProgress = progress;
      best = e;
    }
  }
  return best;
}

function towerTryShoot(t) {
  if (t.cd > 0) { t.cd--; return; }
  const target = findTarget(t);
  if (!target) return;
  const def = ELEMENTS[t.elem];
  t.cd = def.cd;

  // chain attacks: instant, no projectile
  if (def.attack === "chain" || def.attack === "chainaoe") {
    let dmg = def.dmg;
    let jumpsLeft = def.attack === "chain" ? 3 : 4;
    let chainRange = def.attack === "chain" ? 95 : 110;
    let prev = t;
    let hit = [];
    let cur = target;
    while (cur && jumpsLeft > 0) {
      damageEnemy(cur, dmg);
      hit.push(cur);
      game.effects.push({type:"lightning", x1:prev.x, y1:prev.y, x2:cur.x, y2:cur.y, life:7, max:7, color:def.color});
      if (def.attack === "chainaoe") {
        for (const e of game.enemies) {
          if (!hit.includes(e) && !e.dead && distXY(cur.x, cur.y, e.x, e.y) < 38) {
            damageEnemy(e, dmg * 0.45);
          }
        }
      }
      prev = cur;
      jumpsLeft--;
      dmg *= 0.7;
      cur = null;
      let bestD = chainRange;
      for (const e of game.enemies) {
        if (hit.includes(e) || e.dead) continue;
        const d = distXY(prev.x, prev.y, e.x, e.y);
        if (d < bestD) { bestD = d; cur = e; }
      }
    }
    return;
  }

  // projectile-based attacks
  game.projectiles.push({
    x: t.x, y: t.y,
    target,
    elem: t.elem,
    speed: 7.5,
    dead: false,
    hits: 0,
    alreadyHit: new Set(),
  });
}

function applyProjectileImpact(p, target) {
  const def = ELEMENTS[p.elem];
  switch (def.attack) {
    case "normal":
      damageEnemy(target, def.dmg);
      break;
    case "slow":
      damageEnemy(target, def.dmg);
      target.slow = Math.max(target.slow, p.elem === "mud" ? 90 : 50);
      break;
    case "burn":
      damageEnemy(target, def.dmg);
      target.burn = 110;
      break;
    case "freeze":
      damageEnemy(target, def.dmg);
      if (Math.random() < 0.28) {
        target.frozen = Math.max(target.frozen, 35);
        game.effects.push({type:"freeze", x:target.x, y:target.y, life:18, max:18});
      }
      break;
    case "crit":
      const crit = Math.random() < 0.3;
      damageEnemy(target, crit ? def.dmg * 3 : def.dmg);
      if (crit) game.effects.push({type:"hit", x:target.x, y:target.y, life:18, max:18});
      break;
    case "aoe":
      damageEnemy(target, def.dmg);
      for (const e of game.enemies) {
        if (e !== target && !e.dead && distXY(target.x, target.y, e.x, e.y) < 55) {
          damageEnemy(e, def.dmg * 0.65);
        }
      }
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:18, max:18, r:55});
      break;
    case "pierce":
      damageEnemy(target, def.dmg);
      p.alreadyHit.add(target);
      p.hits++;
      if (p.hits < 3) {
        // find next target
        let next = null, bestD = 90;
        for (const e of game.enemies) {
          if (p.alreadyHit.has(e) || e.dead) continue;
          const d = distXY(p.x, p.y, e.x, e.y);
          if (d < bestD) { bestD = d; next = e; }
        }
        if (next) {
          p.target = next;
          return false; // not dead, keep going
        }
      }
      break;
    case "aoeSlow":
      damageEnemy(target, def.dmg);
      target.slow = Math.max(target.slow, 90);
      for (const e of game.enemies) {
        if (e !== target && !e.dead && distXY(target.x, target.y, e.x, e.y) < 75) {
          damageEnemy(e, def.dmg * 0.55);
          e.slow = Math.max(e.slow, 90);
        }
      }
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:18, max:18, r:75});
      break;
    case "pierceBurn":
      damageEnemy(target, def.dmg);
      target.burn = 100;
      p.alreadyHit.add(target);
      p.hits++;
      if (p.hits < 3) {
        let next = null, bestD = 95;
        for (const e of game.enemies) {
          if (p.alreadyHit.has(e) || e.dead) continue;
          const d = distXY(p.x, p.y, e.x, e.y);
          if (d < bestD) { bestD = d; next = e; }
        }
        if (next) { p.target = next; return false; }
      }
      break;
    case "critFreeze": {
      const isCrit = Math.random() < 0.4;
      damageEnemy(target, isCrit ? def.dmg * 2.5 : def.dmg);
      if (isCrit) game.effects.push({type:"hit", x:target.x, y:target.y, life:18, max:18});
      if (Math.random() < 0.35) {
        target.frozen = Math.max(target.frozen, 40);
        game.effects.push({type:"freeze", x:target.x, y:target.y, life:18, max:18});
      }
      break;
    }
    case "critPierce": {
      const isCrit = Math.random() < 0.5;
      damageEnemy(target, isCrit ? def.dmg * 2.5 : def.dmg);
      if (isCrit) game.effects.push({type:"hit", x:target.x, y:target.y, life:20, max:20});
      p.alreadyHit.add(target);
      p.hits++;
      if (p.hits < 4) {
        let next = null, bestD = 110;
        for (const e of game.enemies) {
          if (p.alreadyHit.has(e) || e.dead) continue;
          const d = distXY(p.x, p.y, e.x, e.y);
          if (d < bestD) { bestD = d; next = e; }
        }
        if (next) { p.target = next; return false; }
      }
      break;
    }
    case "tarSlow":
      // damage + heavy slow + burn DOT, plus small AOE that slows everyone
      damageEnemy(target, def.dmg);
      target.slow = Math.max(target.slow, 130);
      target.burn = 100;
      for (const e of game.enemies) {
        if (e !== target && !e.dead && distXY(target.x, target.y, e.x, e.y) < 50) {
          damageEnemy(e, def.dmg * 0.5);
          e.slow = Math.max(e.slow, 100);
        }
      }
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:18, max:18, r:55});
      break;
    case "chainSlow": {
      // chain that damages and slows each enemy hit
      damageEnemy(target, def.dmg);
      target.slow = Math.max(target.slow, 80);
      const visited = new Set([target]);
      let prev = target;
      let dmg = def.dmg * 0.8;
      let jumps = 3;
      while (jumps > 0) {
        let next = null, bestD = 110;
        for (const e of game.enemies) {
          if (visited.has(e) || e.dead) continue;
          const d = distXY(prev.x, prev.y, e.x, e.y);
          if (d < bestD) { bestD = d; next = e; }
        }
        if (!next) break;
        damageEnemy(next, dmg);
        next.slow = Math.max(next.slow, 80);
        game.effects.push({type:"lightning", x1:prev.x, y1:prev.y, x2:next.x, y2:next.y, life:7, max:7, color:"#cfd9e8"});
        visited.add(next);
        prev = next;
        dmg *= 0.8;
        jumps--;
      }
      break;
    }
    case "chainCrit": {
      // beautiful chain, 35% crit chance per hit, 4 jumps
      const isCrit0 = Math.random() < 0.35;
      damageEnemy(target, isCrit0 ? def.dmg * 2.2 : def.dmg);
      if (isCrit0) game.effects.push({type:"hit", x:target.x, y:target.y, life:18, max:18});
      const visited = new Set([target]);
      let prev = target;
      let dmg = def.dmg * 0.85;
      let jumps = 4;
      while (jumps > 0) {
        let next = null, bestD = 130;
        for (const e of game.enemies) {
          if (visited.has(e) || e.dead) continue;
          const d = distXY(prev.x, prev.y, e.x, e.y);
          if (d < bestD) { bestD = d; next = e; }
        }
        if (!next) break;
        const isCrit = Math.random() < 0.35;
        damageEnemy(next, isCrit ? dmg * 2.2 : dmg);
        if (isCrit) game.effects.push({type:"hit", x:next.x, y:next.y, life:18, max:18});
        // rainbow-tinted chain bolt
        const hue = (game.tick * 6 + visited.size * 60) % 360;
        game.effects.push({type:"lightning", x1:prev.x, y1:prev.y, x2:next.x, y2:next.y, life:8, max:8, color:`hsl(${hue}, 100%, 65%)`});
        visited.add(next);
        prev = next;
        dmg *= 0.82;
        jumps--;
      }
      break;
    }
    case "meteorBlast":
      // massive AOE blast — huge radius, big falloff
      damageEnemy(target, def.dmg);
      for (const e of game.enemies) {
        if (e !== target && !e.dead) {
          const d = distXY(target.x, target.y, e.x, e.y);
          if (d < 90) {
            const falloff = 1 - (d / 90) * 0.5;
            damageEnemy(e, def.dmg * 0.7 * falloff);
            e.burn = 80;
          }
        }
      }
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:28, max:28, r:90});
      // secondary smaller ring
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:18, max:18, r:55});
      break;
    case "singularity": {
      // gravitationally pulls all enemies in 130 toward target, then heavy AOE
      damageEnemy(target, def.dmg);
      for (const e of game.enemies) {
        if (e === target || e.dead) continue;
        const d = distXY(target.x, target.y, e.x, e.y);
        if (d < 140) {
          // pull toward target
          const pull = (1 - d / 140) * 12;
          const dx = target.x - e.x, dy = target.y - e.y;
          if (d > 1) {
            e.x += (dx / d) * pull;
            e.y += (dy / d) * pull;
          }
          const falloff = 1 - (d / 140) * 0.4;
          damageEnemy(e, def.dmg * 0.65 * falloff);
          e.slow = Math.max(e.slow, 100);
        }
      }
      // dark vortex visual
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:30, max:30, r:140});
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:22, max:22, r:90});
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:14, max:14, r:50});
      break;
    }
    case "apocalypse": {
      // doomsday AOE — massive radius, big damage, burn everyone
      damageEnemy(target, def.dmg);
      for (const e of game.enemies) {
        if (e === target || e.dead) continue;
        const d = distXY(target.x, target.y, e.x, e.y);
        if (d < 120) {
          const falloff = 1 - (d / 120) * 0.45;
          damageEnemy(e, def.dmg * 0.75 * falloff);
          e.burn = 150;
        }
      }
      // triple-ring explosion
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:34, max:34, r:120});
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:24, max:24, r:80});
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:14, max:14, r:45});
      break;
    }
    case "eternity": {
      // ultimate chain — crit + slow + burn on every hit, 6 jumps
      let dmg = def.dmg;
      const isCrit0 = Math.random() < 0.5;
      damageEnemy(target, isCrit0 ? dmg * 2.5 : dmg);
      if (isCrit0) game.effects.push({type:"hit", x:target.x, y:target.y, life:22, max:22});
      target.slow = Math.max(target.slow, 100);
      target.burn = 110;
      const visited = new Set([target]);
      let prev = target;
      let jumps = 6;
      while (jumps > 0) {
        let next = null, bestD = 150;
        for (const e of game.enemies) {
          if (visited.has(e) || e.dead) continue;
          const d = distXY(prev.x, prev.y, e.x, e.y);
          if (d < bestD) { bestD = d; next = e; }
        }
        if (!next) break;
        const isCrit = Math.random() < 0.5;
        damageEnemy(next, isCrit ? dmg * 2.5 : dmg);
        if (isCrit) game.effects.push({type:"hit", x:next.x, y:next.y, life:22, max:22});
        next.slow = Math.max(next.slow, 100);
        next.burn = 110;
        const hue = (game.tick * 8 + visited.size * 50) % 360;
        game.effects.push({type:"lightning", x1:prev.x, y1:prev.y, x2:next.x, y2:next.y, life:11, max:11, color:`hsl(${hue}, 100%, 70%)`});
        visited.add(next);
        prev = next;
        dmg *= 0.85;
        jumps--;
      }
      break;
    }
    case "galaxyBlast":
      // chain through 5 enemies, each hit detonates a small AOE
      damageEnemy(target, def.dmg);
      for (const e of game.enemies) {
        if (e !== target && !e.dead && distXY(target.x, target.y, e.x, e.y) < 50) {
          damageEnemy(e, def.dmg * 0.6);
        }
      }
      game.effects.push({type:"explosion", x:target.x, y:target.y, life:18, max:18, r:55});
      {
        const visited = new Set([target]);
        let prev = target;
        let dmg = def.dmg * 0.85;
        let jumps = 4;
        while (jumps > 0) {
          let next = null, bestD = 130;
          for (const e of game.enemies) {
            if (visited.has(e) || e.dead) continue;
            const d = distXY(prev.x, prev.y, e.x, e.y);
            if (d < bestD) { bestD = d; next = e; }
          }
          if (!next) break;
          damageEnemy(next, dmg);
          for (const e of game.enemies) {
            if (!visited.has(e) && e !== next && !e.dead && distXY(next.x, next.y, e.x, e.y) < 45) {
              damageEnemy(e, dmg * 0.5);
            }
          }
          game.effects.push({type:"lightning", x1:prev.x, y1:prev.y, x2:next.x, y2:next.y, life:8, max:8, color:"#b388ff"});
          game.effects.push({type:"explosion", x:next.x, y:next.y, life:14, max:14, r:45});
          visited.add(next);
          prev = next;
          dmg *= 0.78;
          jumps--;
        }
      }
      break;
  }
  return true; // dead
}

// ============================================================
// UPDATES
// ============================================================
function updateEnemy(e) {
  if (e.dead) return;
  // status effects
  if (e.frozen > 0) { e.frozen--; return; }
  if (e.burn > 0) { e.hp -= 0.45; e.burn--; if (e.hp <= 0) { damageEnemy(e, 0); return; } }

  const target = PATH[e.pathIdx + 1];
  if (!target) {
    // reached end
    e.dead = true;
    e.reachedEnd = true;
    return;
  }
  let speed = ENEMY_TYPES[e.type].speed;
  if (e.slow > 0) { speed *= 0.4; e.slow--; }
  const dx = target.x - e.x, dy = target.y - e.y;
  const d = Math.hypot(dx, dy);
  if (d <= speed) {
    e.x = target.x; e.y = target.y;
    e.pathIdx++;
  } else {
    e.x += dx / d * speed;
    e.y += dy / d * speed;
  }
}

function updateProjectile(p) {
  if (p.dead) return;
  if (!p.target || p.target.dead) {
    // try to acquire new target nearby
    let nb = null, bestD = 100;
    for (const e of game.enemies) {
      if (e.dead || p.alreadyHit.has(e)) continue;
      const d = distXY(p.x, p.y, e.x, e.y);
      if (d < bestD) { bestD = d; nb = e; }
    }
    if (nb) p.target = nb;
    else { p.dead = true; return; }
  }
  const dx = p.target.x - p.x, dy = p.target.y - p.y;
  const d = Math.hypot(dx, dy);
  if (d <= p.speed) {
    p.x = p.target.x; p.y = p.target.y;
    const isDead = applyProjectileImpact(p, p.target);
    if (isDead) p.dead = true;
  } else {
    p.x += dx / d * p.speed;
    p.y += dy / d * p.speed;
  }
}

function updateEffect(fx) {
  fx.life--;
}

// ============================================================
// WAVES
// ============================================================
function startWave() {
  if (game.state !== "idle") return;
  game.waveNum++;
  const w = getWave(game.waveNum);
  game.state = "spawning";
  game.spawnQueue = [];
  // build queue
  for (const [type, count, interval, startDelay] of w.spawns) {
    for (let i = 0; i < count; i++) {
      game.spawnQueue.push({type, time: startDelay + i * interval, hpMul: w.hpMul});
    }
  }
  game.spawnQueue.sort((a,b) => a.time - b.time);
  game.spawnTimer = 0;
  updateHud();
  const tag = game.waveNum > WAVES.length ? "ENDLESS" : "incoming";
  showToast(`Wave ${game.waveNum} ${tag}!`);
}

// procedurally generates waves beyond the scripted 10
function getWave(n) {
  if (n <= WAVES.length) return WAVES[n - 1];
  const k = n - WAVES.length;
  const hpMul = 3.40 + k * 0.40;
  const reward = 300 + k * 80;
  const spawns = [
    ["fast",   18 + k * 2, Math.max(14, 20 - k),     0],
    ["tank",   7 + Math.floor(k / 1.5), Math.max(70, 100 - k * 4), 200],
    ["normal", 14 + k * 2, Math.max(20, 28 - k),     400],
    ["swarm",  16 + k * 4, Math.max(8, 14 - k),      600],
  ];
  // boss every 3rd endless wave, multiple after a while
  if (k % 3 === 0) {
    spawns.push(["boss", 1 + Math.floor(k / 6), 220, 700]);
  }
  return { spawns, reward, hpMul };
}

// drops a "dead spot" — an area where towers can't be placed.
// runs after every wave clear once we're past wave 10.
function spawnDeadSpot() {
  for (let attempt = 0; attempt < 40; attempt++) {
    const x = 60 + Math.random() * (W - 120);
    const y = 60 + Math.random() * (H - 120);
    if (distToPath(x, y) < 42) continue;
    let bad = false;
    for (const t of game.towers) {
      if (distXY(x, y, t.x, t.y) < TOWER_RADIUS + 30) { bad = true; break; }
    }
    if (bad) continue;
    for (const d of game.deadSpots) {
      if (distXY(x, y, d.x, d.y) < d.r + 35) { bad = true; break; }
    }
    if (bad) continue;
    const r = 30 + Math.random() * 14;
    game.deadSpots.push({ x, y, r });
    showToast("// A VOID HAS CRACKED OPEN //");
    return true;
  }
  return false;
}

function spawnEnemy(type, hpMul) {
  const def = ENEMY_TYPES[type];
  game.enemies.push({
    type,
    x: PATH[0].x, y: PATH[0].y,
    pathIdx: 0,
    hp: def.hp * hpMul,
    maxHp: def.hp * hpMul,
    reward: def.reward,
    slow: 0, burn: 0, frozen: 0,
    dead: false, reachedEnd: false,
  });
}

function tickWaves() {
  if (game.state !== "spawning" && game.state !== "running") return;
  if (game.state === "spawning") {
    game.spawnTimer++;
    while (game.spawnQueue.length && game.spawnQueue[0].time <= game.spawnTimer) {
      const s = game.spawnQueue.shift();
      spawnEnemy(s.type, s.hpMul);
    }
    if (game.spawnQueue.length === 0) {
      game.state = "running";
    }
  }
  if (game.state === "running" && game.enemies.length === 0) {
    // wave clear
    const w = getWave(game.waveNum);
    game.coins += w.reward;
    showToast(`Wave ${game.waveNum} cleared — +${w.reward}c`);
    game.state = "idle";
    // milestone for surviving the scripted 10 waves
    if (game.waveNum === WAVES.length) {
      showMessage("🌀 ENDLESS MODE", "You survived the scripted waves. Now things get rough — voids will start cracking the field. Survive as long as you can.");
      setTimeout(() => hideMessage(), 4500);
    }
    // every wave 10+ cracks open a new dead spot somewhere on the field
    if (game.waveNum >= WAVES.length) {
      spawnDeadSpot();
    }
    updateHud();
    refreshShop();
    saveGame();
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function tickGame() {
  game.tick++;
  // towers shoot
  for (const t of game.towers) towerTryShoot(t);
  // projectiles
  for (const p of game.projectiles) updateProjectile(p);
  game.projectiles = game.projectiles.filter(p => !p.dead);
  // enemies
  for (const e of game.enemies) updateEnemy(e);
  // handle reached-end
  for (const e of game.enemies) {
    if (e.reachedEnd) {
      game.lives--;
      if (game.lives <= 0) {
        game.lives = 0;
        if (game.state !== "defeat") {
          game.state = "defeat";
          showMessage("DEFEAT", "Press Restart to try again.");
        }
      }
    }
  }
  game.enemies = game.enemies.filter(e => !e.dead);
  // effects
  for (const fx of game.effects) updateEffect(fx);
  game.effects = game.effects.filter(fx => fx.life > 0);

  tickWaves();
  updateHud();
}

function loop() {
  try {
    if (game.state !== "victory" && game.state !== "defeat") {
      const steps = game.speed;
      for (let i = 0; i < steps; i++) tickGame();
    }
    render();
  } catch (err) {
    console.error("Game loop error (continuing):", err);
  }
  requestAnimationFrame(loop);
}

// ============================================================
// UI
// ============================================================
function updateHud() {
  document.getElementById("lives").textContent = game.lives;
  document.getElementById("coins").textContent = game.coins;
  document.getElementById("wave").textContent = game.waveNum;
  document.getElementById("stat-lives").classList.toggle("lives-low", game.lives <= 1);
  const startBtn = document.getElementById("start-wave");
  startBtn.disabled = game.state !== "idle";
  startBtn.textContent = game.waveNum === 0 ? "Start Wave 1"
                       : game.waveNum >= WAVES.length ? `Start Endless Wave ${game.waveNum + 1}`
                       : `Start Wave ${game.waveNum + 1}`;
}

function refreshShop() {
  const container = document.getElementById("shop-elements");
  container.innerHTML = "";
  // ordered: tier 1 then 2 then 3
  const order = Object.keys(ELEMENTS).sort((a,b) => ELEMENTS[a].tier - ELEMENTS[b].tier);
  for (const key of order) {
    const def = ELEMENTS[key];
    const discovered = game.discovered.has(key);
    const card = document.createElement("div");
    card.className = "elem";
    if (!discovered) card.classList.add("locked");
    const isStarter = key === game.startElement && game.freeStarterAvailable;
    const cost = isStarter ? 0 : def.cost;
    if (discovered && game.coins < cost) card.classList.add("cant-afford");
    if (game.selectedElem === key) card.classList.add("selected");

    if (discovered) {
      // show the FULL element name in the bubble — auto-shrink for long names
      const nLen = def.name.length;
      const iconClass = nLen > 10 ? "icon xlong" : nLen > 7 ? "icon long" : "icon";
      card.innerHTML = `
        <div class="${iconClass}" style="color:${def.color};">${def.name.toUpperCase()}</div>
        <div class="cost ${isStarter ? "free" : ""}">${isStarter ? "FREE" : cost + "c"}</div>
        <div class="tier">T${def.tier}</div>
      `;
      card.onclick = () => {
        if (game.coins < cost) return;
        if (game.selectedElem === key) game.selectedElem = null;
        else {
          game.selectedElem = key;
          game.selectedTower = null;
        }
        refreshShop();
        renderInfo();
      };
      card.onmouseenter = () => showStatsHint(key);
    } else {
      card.innerHTML = `
        <div class="icon">❔</div>
        <div class="name">???</div>
        <div class="cost">Locked</div>
        <div class="tier">T${def.tier}</div>
      `;
      card.title = `Discover via merging`;
    }
    container.appendChild(card);
  }
}

function showStatsHint(key) {
  if (game.selectedTower) return;
  const def = ELEMENTS[key];
  const attackDesc = {
    normal: "Single-target damage",
    slow: "Damage + slow",
    burn: "Damage + burn over time",
    freeze: "Chance to freeze target",
    crit: "30% chance for triple damage",
    aoe: "Splash damage on impact",
